<!-- On-screen error reporting: if anything fails, show it instead of a blank screen -->
<script>
  window.addEventListener('error', function (e) {
    showFatalError((e.message || 'Script failed to load') + (e.filename ? '\n\nFile: ' + e.filename + (e.lineno ? ':' + e.lineno : '') : ''));
  }, true); // capture:true so we also catch <script src> load failures, not just JS errors
  window.addEventListener('unhandledrejection', function (e) {
    showFatalError('Unhandled error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  function showFatalError(msg) {
    const root = document.getElementById('root');
    if (root.dataset.errorShown) return;
    root.dataset.errorShown = '1';
    root.innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:sans-serif;color:#ECE8DF;background:#1B1E20;text-align:center;">' +
      '<div style="max-width:520px;"><h1 style="color:#E8622C;font-size:1.4rem;">Something went wrong loading the app</h1>' +
      '<p style="margin-top:1rem;">Please screenshot this and send it back:</p>' +
      '<pre style="text-align:left;background:#242829;padding:1rem;border-radius:8px;overflow:auto;font-size:0.75rem;white-space:pre-wrap;">' +
      String(msg).replace(/</g, '&lt;') + '</pre></div></div>';
  }

  // Fallback diagnostic: if nothing has rendered into #root after 6 seconds,
  // report exactly which external libraries loaded and which didn't.
  setTimeout(function () {
    const root = document.getElementById('root');
    if (root.dataset.errorShown) return;
    if (root.children.length > 0) return; // app rendered fine
    const status = window.__loadStatus || {};
    const lines = ['tailwind', 'react', 'react-dom', 'babel', 'firebase-app', 'firebase-db'].map(function (k) {
      return k + ': ' + (status[k] || 'never finished loading');
    });
    showFatalError('The app never finished starting up. Here is what loaded:\n\n' + lines.join('\n'));
  }, 6000);
</script>

// Mirrors the last-known data into localStorage so mechanics can still SEE
// their board (read-only) even opening the app fresh with zero signal.
// New changes made offline still rely on Firebase's own queue-and-sync,
// which only survives as long as the app isn't fully closed before
// reconnecting — this cache is purely for offline viewing, not writes.
function cacheGet(key, fallback) {
  try {
    const raw = localStorage.getItem('cache_' + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function cacheSet(key, value) {
  try {
    localStorage.setItem('cache_' + key, JSON.stringify(value));
  } catch (e) {
    // storage full or unavailable — offline viewing just won't have this data
  }
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

// Total paid hours for a shift: clock-in to clock-out, minus any unpaid break.
function entryHours(entry) {
  if (!entry.clockIn || !entry.clockOut) return 0;
  let ms = new Date(entry.clockOut) - new Date(entry.clockIn);
  if (entry.lunchStart && entry.lunchEnd) {
    ms -= new Date(entry.lunchEnd) - new Date(entry.lunchStart);
  }
  return Math.max(0, ms / 1000 / 60 / 60);
}

function fmtHours(h) {
  return h.toFixed(2).replace(/\.00$/, '');
}

// Pay week runs Sunday–Saturday. Given any date string ('YYYY-MM-DD'),
// return that week's Sunday as the week's identifying key.
function weekStartOf(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - d.getDay());
  return d.toISOString().slice(0, 10);
}
function weekEndOf(weekStart) {
  const d = new Date(weekStart + 'T00:00:00');
  d.setDate(d.getDate() + 6);
  return d.toISOString().slice(0, 10);
}
function fmtWeekRange(weekStart) {
  const end = weekEndOf(weekStart);
  return `${fmtDate(weekStart)} – ${fmtDate(end)}`;
}

// Resize + compress a photo before storing it, so the shared database stays fast
// to sync over a mechanic's cell signal out in the field.
function compressImage(file, maxDim = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// One-way hash so raw PINs are never stored or sent anywhere in plain text.
async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
}

function webauthnKey(name) {
  return 'webauthn_cred_' + name;
}

async function webauthnAvailable() {
  return !!(
    window.PublicKeyCredential &&
    window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable &&
    (await window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable())
  );
}

// Registers Face ID / Touch ID (or Windows Hello, etc.) as a shortcut on THIS device only.
// The credential never leaves the device — it's just a local unlock, not shared identity proof.
async function registerBiometric(name) {
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const cred = await navigator.credentials.create({
    publicKey: {
      challenge,
      rp: { name: 'Harder Contracting Work Orders' },
      user: {
        id: new TextEncoder().encode(name),
        name,
        displayName: name,
      },
      pubKeyCredParams: [
        { type: 'public-key', alg: -7 },
        { type: 'public-key', alg: -257 },
      ],
      authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
      timeout: 60000,
    },
  });
  const credIdB64 = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
  localStorage.setItem(webauthnKey(name), credIdB64);
}

async function verifyBiometric(name) {
  const credIdB64 = localStorage.getItem(webauthnKey(name));
  if (!credIdB64) return false;
  try {
    const credId = Uint8Array.from(atob(credIdB64), (c) => c.charCodeAt(0));
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ id: credId, type: 'public-key' }],
        userVerification: 'required',
        timeout: 60000,
      },
    });
    return true;
  } catch (e) {
    return false;
  }
}

function PunchHole({ bg }) {

function StatusStamp({ status, small }) {
  return (
    <span
      style={{
        borderColor: statusColor(status),
        color: statusColor(status),
        transform: 'rotate(-3deg)',
        fontSize: small ? '10px' : '11px',
      }}
      className="font-display border-2 rounded-sm px-2 py-0.5 font-bold uppercase tracking-wider whitespace-nowrap inline-block"

function Btn({ children, onClick, variant = 'primary', className = '', type = 'button', disabled }) {
  const base = 'font-display font-bold uppercase tracking-wide text-base px-6 py-3.5 rounded-xl transition-all focus:outline-none focus:ring-2 cursor-pointer active:scale-95';
  const styles = {
    primary: { background: COLORS.accent, color: '#1B1F19', boxShadow: '0 3px 8px rgba(0,0,0,0.35)', border: 'none' },
    ghost: { background: 'transparent', color: COLORS.ink, border: `2.5px solid ${COLORS.line}`, boxShadow: 'none' },
    danger: { background: 'transparent', color: '#E07A5F', border: '2.5px solid #E07A5F', boxShadow: 'none' },
  };
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      style={{ ...styles[variant], opacity: disabled ? 0.5 : 1, pointerEvents: disabled ? 'none' : 'auto' }}
      className={`${base} ${className} hover:scale-105`}
    >
      {children}
    </button>
  );
}

function TextField({ label, value, onChange, placeholder, type = 'text', mono, helper }) {
  return (
    <label className="block mb-4">
      <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>{label}</span>
      {helper && <span className="text-xs block mb-1" style={{ color: COLORS.inkDim }}>{helper}</span>}
      <input
        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        className={`w-full rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2 ${mono ? 'font-mono' : 'font-body'}`}
        style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
      />
    </label>
  );
}

function App() {
  // If we already have cached data from a previous session, skip the loading
  // screen entirely — show it immediately, then let Firebase update it live
  // once (if) a connection is available. Only show "loading" on a true first
  // run with nothing cached yet.
  const [loading, setLoading] = useState(() => cacheGet('orders', null) === null);
  const [mechanics, setMechanics] = useState(() => cacheGet('mechanics', []));
  const [units, setUnits] = useState(() => cacheGet('units', []));
  const [orders, setOrders] = useState(() => cacheGet('orders', []));
  const [currentMechanic, setCurrentMechanic] = useState(null);
  const [screen, setScreen] = useState('login');
  const [activeUnit, setActiveUnit] = useState(null);
  const [activeOrderId, setActiveOrderId] = useState(null);
  const [newMechanicName, setNewMechanicName] = useState('');
  const [newUnitName, setNewUnitName] = useState('');
  const [showAddUnit, setShowAddUnit] = useState(false);
  const [showAddOrder, setShowAddOrder] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [templates, setTemplates] = useState(() => cacheGet('templates', []));
  const [showNewTemplate, setShowNewTemplate] = useState(false);
  const [confirmDeleteTemplate, setConfirmDeleteTemplate] = useState(null);
  const [attachTemplateId, setAttachTemplateId] = useState('');
  const [isOnline, setIsOnline] = useState(true);
  const [pins, setPins] = useState({});
  const [pinModal, setPinModal] = useState(null); // { mode: 'verify'|'setup', mechanic, stage, firstEntry }
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState('');
  const [offerBiometric, setOfferBiometric] = useState(null);
  const [bioMsg, setBioMsg] = useState('');
  const [searchQuery, setSearchQuery] = useState('');
  const [admins, setAdmins] = useState([]);
  const [showRemoveConfirm, setShowRemoveConfirm] = useState(null);
  const [editingTemplateId, setEditingTemplateId] = useState(null);
  const [showAdHocChecklist, setShowAdHocChecklist] = useState(false);
  const [timesheets, setTimesheets] = useState(() => cacheGet('timesheets', []));
  const [timesheetSettings, setTimesheetSettings] = useState({ email: '', autoEmail: false });
  const [lunchPrompt, setLunchPrompt] = useState(false);
  const [editingEntryId, setEditingEntryId] = useState(null);
  const [tsFilterMechanic, setTsFilterMechanic] = useState('');
  const [tsFilterStart, setTsFilterStart] = useState('');
  const [tsFilterEnd, setTsFilterEnd] = useState('');
  const [tsEmailDraft, setTsEmailDraft] = useState(null);
  const [showClockInPrompt, setShowClockInPrompt] = useState(false);
  const [editingNoteId, setEditingNoteId] = useState(null);
  const [editingOrderChecklistId, setEditingOrderChecklistId] = useState(null);
  const [timesheetApprovals, setTimesheetApprovals] = useState({});
  const [tsWeekOffset, setTsWeekOffset] = useState(0);
  const [mySummaryStart, setMySummaryStart] = useState('');
  const [mySummaryEnd, setMySummaryEnd] = useState('');

  useEffect(() => {
    const apRef = firebase.database().ref('timesheetApprovals');
    const onAp = apRef.on('value', (snap) => {
      setTimesheetApprovals(snap.val() || {});
    });
    return () => apRef.off('value', onAp);
  }, []);

  useEffect(() => {
    const tsRef = firebase.database().ref('timesheets');
    const onTs = tsRef.on('value', (snap) => {
      const val = snap.val() || [];
      setTimesheets(val);
      cacheSet('timesheets', val);
    });
    return () => tsRef.off('value', onTs);
  }, []);

  useEffect(() => {
    const settingsRef = firebase.database().ref('timesheetSettings');
    const onSettings = settingsRef.on('value', (snap) => {
      setTimesheetSettings(snap.val() || { email: '', autoEmail: false });
    });
    return () => settingsRef.off('value', onSettings);
  }, []);

  useEffect(() => {
    const connectedRef = firebase.database().ref('.info/connected');
    const onConnected = connectedRef.on('value', (snap) => {
      setIsOnline(snap.val() === true);
    });
    return () => connectedRef.off('value', onConnected);
  }, []);

  useEffect(() => {
    const pinsRef = firebase.database().ref('pins');
    const onPins = pinsRef.on('value', (snap) => {
      setPins(snap.val() || {});
    });
    return () => pinsRef.off('value', onPins);
  }, []);

  useEffect(() => {
    const adminsRef = firebase.database().ref('admins');
    const onAdmins = adminsRef.on('value', (snap) => {
      const val = snap.val();
      if (val && val.length > 0) {
        setAdmins(val);
      } else {
        // Seed the very first admin so someone can always manage the team.
        adminsRef.set(['Joe']);
        setAdmins(['Joe']);
      }
    });
    return () => adminsRef.off('value', onAdmins);
  }, []);

  useEffect(() => {
    if (pinModal && pinInput.length === 4) {
      submitPin();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [pinInput]);

  useEffect(() => {
    const db = firebase.database();
    const metaRef = db.ref('meta');
    const ordersRef = db.ref('orders');
    const templatesRef = db.ref('templates');
    const ready = { meta: false, orders: false, templates: false };
    const checkReady = () => {
      if (ready.meta && ready.orders && ready.templates) setLoading(false);
    };

    const onMeta = metaRef.on('value', (snap) => {
      const meta = snap.val() || { mechanics: [], units: [] };
      setMechanics(meta.mechanics || []);
      setUnits(meta.units || []);
      cacheSet('mechanics', meta.mechanics || []);
      cacheSet('units', meta.units || []);
      ready.meta = true;
      checkReady();
    });
    const onOrders = ordersRef.on('value', (snap) => {
      const val = snap.val() || [];
      setOrders(val);
      cacheSet('orders', val);
      ready.orders = true;
      checkReady();
    });
    const onTemplates = templatesRef.on('value', (snap) => {
      const t = snap.val();
      if (t) {
        setTemplates(t);
        cacheSet('templates', t);
      } else {
        templatesRef.set(DEFAULT_TEMPLATES);
      }
      ready.templates = true;
      checkReady();
    });

    return () => {
      metaRef.off('value', onMeta);
      ordersRef.off('value', onOrders);
      templatesRef.off('value', onTemplates);
    };
  }, []);

  const persistMeta = async (nextMechanics, nextUnits) => {
    setMechanics(nextMechanics);
    setUnits(nextUnits);
    await saveMeta({ mechanics: nextMechanics, units: nextUnits });
  };
  const persistOrders = async (next) => {
    setOrders(next);
    await saveOrders(next);
  };
  const persistTemplates = async (next) => {
    setTemplates(next);
    await saveTemplates(next);
  };

  const persistPins = async (next) => {
    setPins(next);
    await savePins(next);
  };

  const handleMechanicTap = async (name) => {
    setPinError('');
    const hasCred = !!localStorage.getItem('webauthn_cred_' + name);
    if (hasCred) {
      const ok = await verifyBiometric(name);
      if (ok) {
        setCurrentMechanic(name);
        setScreen('dashboard');
        return;
      }
      // if biometric fails or is cancelled, fall through to PIN entry
    }
    setPinInput('');
    if (pins[name]) {
      setPinModal({ mode: 'verify', mechanic: name });
    } else {
      setPinModal({ mode: 'setup', mechanic: name, stage: 'first', firstEntry: '' });
    }
  };

  const submitPin = async () => {
    if (!pinModal || pinInput.length !== 4) return;
    if (pinModal.mode === 'verify') {
      const hash = await sha256Hex(pinInput);
      if (hash === pins[pinModal.mechanic]) {
        const mechanic = pinModal.mechanic;
        setPinModal(null);
        setPinInput('');
        setPinError('');
        setCurrentMechanic(mechanic);
        setScreen('dashboard');
        maybeOfferBiometric(mechanic);
      } else {
        setPinError('Wrong PIN — try again');
        setPinInput('');
      }
    } else if (pinModal.mode === 'setup') {
      if (pinModal.stage === 'first') {
        setPinModal({ ...pinModal, stage: 'confirm', firstEntry: pinInput });
        setPinInput('');
      } else {
        if (pinInput === pinModal.firstEntry) {
          const hash = await sha256Hex(pinInput);
          const nextPins = { ...pins, [pinModal.mechanic]: hash };
          await persistPins(nextPins);
          const mechanic = pinModal.mechanic;
          const isNewMechanic = !mechanics.includes(mechanic);
          setPinModal(null);
          setPinInput('');
          setPinError('');
          if (isNewMechanic) {
            await persistMeta([...mechanics, mechanic], units);
          }
          setCurrentMechanic(mechanic);
          setScreen('dashboard');
          maybeOfferBiometric(mechanic);
        } else {
          setPinError("Those didn't match — start over");
          setPinModal({ ...pinModal, stage: 'first', firstEntry: '' });
          setPinInput('');
        }
      }
    }
  };

  const cancelPinModal = () => {
    setPinModal(null);
    setPinInput('');
    setPinError('');
  };

  const forgotPin = async () => {
    if (!pinModal) return;
    const name = pinModal.mechanic;
    const nextPins = { ...pins };
    delete nextPins[name];
    await persistPins(nextPins);
    localStorage.removeItem('webauthn_cred_' + name);
    setPinModal({ mode: 'setup', mechanic: name, stage: 'first', firstEntry: '' });
    setPinInput('');
    setPinError('');
  };

  const startChangePin = () => {
    setPinError('');
    setPinInput('');
    setPinModal({ mode: 'setup', mechanic: currentMechanic, stage: 'first', firstEntry: '' });
  };

  const maybeOfferBiometric = async (name) => {
    if (localStorage.getItem('webauthn_cred_' + name)) return;
    const avail = await webauthnAvailable().catch(() => false);
    if (avail) setOfferBiometric(name);
  };

  const toggleBiometric = async () => {
    const key = 'webauthn_cred_' + currentMechanic;
    if (localStorage.getItem(key)) {
      localStorage.removeItem(key);
      setBioMsg('Face ID / Touch ID turned off on this device.');
    } else {
      try {
        await registerBiometric(currentMechanic);
        setBioMsg('Face ID / Touch ID enabled on this device.');
      } catch (e) {
        setBioMsg('Could not set that up on this device.');
      }
    }
    setTimeout(() => setBioMsg(''), 4000);
  };

  const addTemplate = async (name, itemsText) => {
    const trimmedName = name.trim();
    const items = itemsText.split('\n').map((l) => l.trim()).filter(Boolean);
    if (!trimmedName || items.length === 0) return;
    const t = { id: uid(), name: trimmedName, items };
    await persistTemplates([...templates, t]);
    setShowNewTemplate(false);
  };

  const deleteTemplate = async (id) => {
    await persistTemplates(templates.filter((t) => t.id !== id));
    setConfirmDeleteTemplate(null);
  };

  const updateTemplate = async (id, name, itemsText) => {
    const trimmedName = name.trim();
    const items = itemsText.split('\n').map((l) => l.trim()).filter(Boolean);
    if (!trimmedName || items.length === 0) return;
    const next = templates.map((t) => (t.id === id ? { ...t, name: trimmedName, items } : t));
    await persistTemplates(next);
    setEditingTemplateId(null);
  };

  // A work order can hold several checklists at once (e.g. the standard
  // summer checklist plus an off-season repair checklist). Older orders
  // saved before this existed have a single `checklist` field instead of
  // a `checklists` array — this helper reads either shape transparently.
  const getChecklists = (order) => {
    if (order.checklists) return order.checklists;
    if (order.checklist) return [{ id: 'legacy', ...order.checklist }];
    return [];
  };

  const attachChecklist = async (orderId, templateId) => {
    const template = templates.find((t) => t.id === templateId);
    if (!template) return;
    const order = orders.find((o) => o.id === orderId);
    if (!order) return;
    const checklist = {
      id: uid(),
      templateId: template.id,
      templateName: template.name,
      items: template.items.map((text) => ({ id: uid(), text, checked: false, checkedBy: null, checkedAt: null })),
    };
    const nextChecklists = [...getChecklists(order), checklist];
    await updateOrder(orderId, { checklists: nextChecklists, checklist: null });
    setAttachTemplateId('');
  };

  const detachChecklist = async (orderId, checklistId) => {
    const order = orders.find((o) => o.id === orderId);
    if (!order) return;
    const nextChecklists = getChecklists(order).filter((c) => c.id !== checklistId);
    await updateOrder(orderId, { checklists: nextChecklists, checklist: null });
  };

  const createAdHocChecklist = async (orderId, name, itemsText, saveAsTemplate) => {
    const trimmedName = name.trim();
    const items = itemsText.split('\n').map((l) => l.trim()).filter(Boolean);
    if (!trimmedName || items.length === 0) return;
    const order = orders.find((o) => o.id === orderId);
    if (!order) return;
    const checklist = {
      id: uid(),
      templateId: null,
      templateName: trimmedName,
      items: items.map((text) => ({ id: uid(), text, checked: false, checkedBy: null, checkedAt: null })),
    };
    const nextChecklists = [...getChecklists(order), checklist];
    await updateOrder(orderId, { checklists: nextChecklists, checklist: null });
    if (saveAsTemplate) {
      await persistTemplates([...templates, { id: uid(), name: trimmedName, items }]);
    }
  };

  const toggleChecklistItem = async (orderId, checklistId, itemId) => {
    const order = orders.find((o) => o.id === orderId);
    if (!order) return;
    const nextChecklists = getChecklists(order).map((c) => {
      if (c.id !== checklistId) return c;
      const items = c.items.map((it) => {
        if (it.id !== itemId) return it;
        const nowChecked = !it.checked;
        return {
          ...it,
          checked: nowChecked,
          checkedBy: nowChecked ? currentMechanic : null,
          checkedAt: nowChecked ? new Date().toISOString() : null,
        };
      });
      return { ...c, items };
    });
    await updateOrder(orderId, { checklists: nextChecklists, checklist: null });
  };

  const updateOrderChecklist = async (orderId, checklistId, name, itemsText) => {
    const trimmedName = name.trim();
    const lines = itemsText.split('\n').map((l) => l.trim()).filter(Boolean);
    if (!trimmedName || lines.length === 0) return;
    const order = orders.find((o) => o.id === orderId);
    if (!order) return;
    const existing = getChecklists(order).find((c) => c.id === checklistId);
    const existingByText = {};
    (existing ? existing.items : []).forEach((it) => { existingByText[it.text] = it; });
    // Keep the checked state for any item whose text didn't change; new/edited
    // lines start fresh so a corrected item doesn't stay marked done by mistake.
    const items = lines.map((text) => existingByText[text] || { id: uid(), text, checked: false, checkedBy: null, checkedAt: null });
    const nextChecklists = getChecklists(order).map((c) =>
      c.id === checklistId ? { ...c, templateName: trimmedName, items } : c
    );
    await updateOrder(orderId, { checklists: nextChecklists, checklist: null });
    setEditingOrderChecklistId(null);
  };

  const addMechanic = () => {
    const name = newMechanicName.trim();
    if (!name || mechanics.includes(name)) return;
    setNewMechanicName('');
    setPinError('');
    setPinInput('');
    // New mechanics set up a PIN before their name is added to the board —
    // persistMeta happens once PIN setup completes, in submitPin().
    setPinModal({ mode: 'setup', mechanic: name, stage: 'first', firstEntry: '' });
  };

  const isAdmin = admins.includes(currentMechanic);

  const removeMechanic = async (name) => {
    const nextMechanics = mechanics.filter((m) => m !== name);
    await persistMeta(nextMechanics, units);
    const nextPins = { ...pins };
    delete nextPins[name];
    await persistPins(nextPins);
    if (admins.includes(name)) {
      const nextAdmins = admins.filter((a) => a !== name);
      setAdmins(nextAdmins);
      await saveAdmins(nextAdmins);
    }
    setShowRemoveConfirm(null);
  };

  const toggleAdmin = async (name) => {
    const nextAdmins = admins.includes(name) ? admins.filter((a) => a !== name) : [...admins, name];
    setAdmins(nextAdmins);
    await saveAdmins(nextAdmins);
  };

  const persistTimesheets = async (next) => {
    setTimesheets(next);
    await saveTimesheets(next);
  };

  const todayStr = () => new Date().toISOString().slice(0, 10);

  // The "open" entry for the current mechanic today: clocked in but not yet clocked out.
  const openEntry = timesheets.find((t) => t.mechanic === currentMechanic && t.date === todayStr() && !t.clockOut);

  // Prompt to clock in once per login, if they haven't already for today.
  useEffect(() => {
    if (currentMechanic && !openEntry) {
      setShowClockInPrompt(true);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [currentMechanic]);

  const clockIn = async () => {
    const entry = {
      id: uid(),
      mechanic: currentMechanic,
      date: todayStr(),
      clockIn: new Date().toISOString(),
      lunchStart: null,
      lunchEnd: null,
      skippedLunch: false,
      clockOut: null,
      jobs: [],
    };
    await persistTimesheets([...timesheets, entry]);
  };

  const startLunch = async () => {
    if (!openEntry) return;
    const next = timesheets.map((t) => (t.id === openEntry.id ? { ...t, lunchStart: new Date().toISOString() } : t));
    await persistTimesheets(next);
  };

  const endLunch = async () => {
    if (!openEntry) return;
    const next = timesheets.map((t) => (t.id === openEntry.id ? { ...t, lunchEnd: new Date().toISOString() } : t));
    await persistTimesheets(next);
  };

  const clockOut = async (skippedLunch) => {
    if (!openEntry) return;
    const next = timesheets.map((t) =>
      t.id === openEntry.id ? { ...t, clockOut: new Date().toISOString(), skippedLunch: !!skippedLunch } : t
    );
    await persistTimesheets(next);
    setLunchPrompt(false);
  };

  const attemptClockOut = () => {
    if (!openEntry) return;
    const hasLunch = openEntry.lunchStart && openEntry.lunchEnd;
    if (!hasLunch && !openEntry.skippedLunch) {
      setLunchPrompt(true);
      return;
    }
    clockOut(openEntry.skippedLunch);
  };

  const addTimesheetJob = async (entryId, unit, hours) => {
    const trimmedUnit = unit.trim();
    const parsedHours = parseFloat(hours);
    if (!trimmedUnit || !parsedHours || parsedHours <= 0) return;
    const next = timesheets.map((t) =>
      t.id === entryId ? { ...t, jobs: [...(t.jobs || []), { id: uid(), unit: trimmedUnit, hours: parsedHours }] } : t
    );
    await persistTimesheets(next);
  };

  const removeTimesheetJob = async (entryId, jobId) => {
    const next = timesheets.map((t) =>
      t.id === entryId ? { ...t, jobs: (t.jobs || []).filter((j) => j.id !== jobId) } : t
    );
    await persistTimesheets(next);
  };

  const updateTimesheetEntry = async (entryId, patch) => {
    const next = timesheets.map((t) => (t.id === entryId ? { ...t, ...patch } : t));
    await persistTimesheets(next);
  };

  const deleteTimesheetEntry = async (entryId) => {
    await persistTimesheets(timesheets.filter((t) => t.id !== entryId));
  };

  const isWeekApproved = (weekStart) => !!timesheetApprovals[weekStart];

  const approveWeek = async (weekStart) => {
    const next = { ...timesheetApprovals, [weekStart]: { approvedBy: currentMechanic, approvedAt: new Date().toISOString() } };
    setTimesheetApprovals(next);
    await saveTimesheetApprovals(next);
  };

  const unapproveWeek = async (weekStart) => {
    const next = { ...timesheetApprovals };
    delete next[weekStart];
    setTimesheetApprovals(next);
    await saveTimesheetApprovals(next);
  };

  const exportTimesheets = async (entries) => {
    const rows = [['Mechanic', 'Date', 'Clock In', 'Clock Out', 'Break Start', 'Break End', 'Worked Through Break', 'Paid Hours', 'Jobs (unit: hours)']];
    entries.forEach((e) => {
      const jobsStr = (e.jobs || []).map((j) => `${j.unit}: ${j.hours}h`).join(' | ');
      rows.push([
        e.mechanic,
        e.date,
        fmtTime(e.clockIn),
        fmtTime(e.clockOut),
        fmtTime(e.lunchStart),
        fmtTime(e.lunchEnd),
        e.skippedLunch ? 'Yes' : 'No',
        fmtHours(entryHours(e)),
        jobsStr,
      ]);
    });
    const csv = rows.map((r) => r.map((cell) => `"${String(cell || '').replace(/"/g, '""')}"`).join(',')).join('\n');
    const filename = `timesheets-${todayStr()}.csv`;
    const file = new File([csv], filename, { type: 'text/csv' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'Timesheets export',
          text: timesheetSettings.email ? `Timesheets for ${timesheetSettings.email}` : 'Timesheets export',
        });
        return;
      } catch (e) {
        // user cancelled the share sheet — fall through to download
      }
    }
    // Fallback: plain download if sharing isn't available on this device
    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  const addUnit = async () => {
    const name = newUnitName.trim();
    if (!name || units.includes(name)) return;
    await persistMeta(mechanics, [...units, name]);
    setNewUnitName('');
    setShowAddUnit(false);
  };

  const createOrder = async (data) => {
    const unitName = (data.unit || activeUnit || '').trim();
    if (!unitName) return;
    if (!units.includes(unitName)) {
      await persistMeta(mechanics, [...units, unitName]);
    }
    const order = {
      id: uid(),
      unit: unitName,
      description: data.description,
      assignedMechanic: data.assignedMechanic,
      hours: data.hours,
      dueDate: data.dueDate,
      dateCreated: new Date().toISOString().slice(0, 10),
      status: 'Open',
      notes: [],
      createdBy: currentMechanic,
    };
    await persistOrders([order, ...orders]);
    setShowAddOrder(false);
  };

  const updateOrder = async (id, patch) => {
    const next = orders.map((o) => (o.id === id ? { ...o, ...patch } : o));
    await persistOrders(next);
  };

  const addNote = async (id, text) => {
    if (!text.trim()) return;
    const note = { id: uid(), author: currentMechanic, text: text.trim(), ts: new Date().toISOString() };
    const next = orders.map((o) => (o.id === id ? { ...o, notes: [...(o.notes || []), note] } : o));
    await persistOrders(next);
  };

  const updateNote = async (orderId, noteId, text) => {
    if (!text.trim()) return;
    const next = orders.map((o) =>
      o.id === orderId
        ? { ...o, notes: (o.notes || []).map((n) => (n.id === noteId ? { ...n, text: text.trim(), edited: true } : n)) }
        : o
    );
    await persistOrders(next);
    setEditingNoteId(null);
  };

  const addPhotos = async (id, dataUrls) => {
    const photos = dataUrls.map((dataUrl) => ({
      id: uid(),
      dataUrl,
      author: currentMechanic,
      ts: new Date().toISOString(),
    }));
    const next = orders.map((o) => (o.id === id ? { ...o, media: [...(o.media || []), ...photos] } : o));
    await persistOrders(next);
  };

  const removePhoto = async (orderId, photoId) => {
    const next = orders.map((o) =>
      o.id === orderId ? { ...o, media: (o.media || []).filter((m) => m.id !== photoId) } : o
    );
    await persistOrders(next);
  };

  const deleteOrder = async (id) => {
    await persistOrders(orders.filter((o) => o.id !== id));
    setScreen('unit');
    setConfirmDelete(false);
  };

  if (loading) {
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="flex items-center justify-center font-display">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <span className="text-sm uppercase tracking-widest" style={{ color: COLORS.inkDim }}>Loading board…</span>
      </div>
    );
  }

  // ---------- LOGIN ----------
  if (screen === 'login' || !currentMechanic) {
    return (
      <div style={{ color: COLORS.ink, minHeight: '100vh', position: 'relative', overflow: 'hidden' }} className="font-body p-6 flex flex-col items-center justify-center">
        {FONT_STYLE}
        <svg
          viewBox="0 0 400 200"
          preserveAspectRatio="xMidYMax slice"
          style={{ position: 'absolute', bottom: 0, left: 0, width: '100%', height: '35vh', opacity: 0.12, pointerEvents: 'none' }}
        >
          <path d="M40 200 L40 140 L20 140 L45 90 L28 90 L55 40 L82 90 L65 90 L90 140 L70 140 L70 200 Z" fill={COLORS.accent} />
          <path d="M130 200 L130 120 L105 120 L135 60 L114 60 L148 0 L182 60 L161 60 L191 120 L166 120 L166 200 Z" fill={COLORS.accent} />
          <path d="M250 200 L250 130 L228 130 L255 75 L238 75 L265 25 L292 75 L275 75 L302 130 L280 130 L280 200 Z" fill={COLORS.accent} />
          <path d="M345 200 L345 145 L327 145 L350 100 L335 100 L358 55 L381 100 L366 100 L389 145 L371 145 L371 200 Z" fill={COLORS.accent} />
        </svg>
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-md w-full" style={{ position: 'relative', zIndex: 1 }}>
          <div className="text-center mb-10">
            <p className="font-display text-sm uppercase tracking-[0.3em] mb-2" style={{ color: COLORS.accent }}>Harder Contracting</p>
            <h1 className="font-display text-4xl font-bold mb-2">Work Order Board</h1>
            <p className="text-base" style={{ color: COLORS.inkDim }}>Pick your name to get started</p>
          </div>

          {mechanics.length > 0 && (
            <div className="mb-8">
              <p className="font-display text-xs uppercase tracking-wider mb-3 block" style={{ color: COLORS.inkDim }}>Tap to sign in</p>
              <div className="grid grid-cols-2 gap-3">
                {mechanics.map((m) => (
                  <button
                    key={m}
                    onClick={() => handleMechanicTap(m)}
                    className="rounded-lg px-4 py-5 font-medium text-center focus:outline-none focus:ring-2 transition-all hover:scale-105 active:scale-95 relative"
                    style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}`, color: COLORS.ink }}
                  >
                    {m}
                    {!!localStorage.getItem('webauthn_cred_' + m) && (
                      <span className="absolute top-1.5 right-2 text-xs" title="Face ID / Touch ID available">🔓</span>
                    )}
                  </button>
                ))}
              </div>
              <div className="h-px my-6" style={{ background: COLORS.line }} />
            </div>
          )}

          <div className="rounded-lg p-5 shop-card" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.accent}` }}>
            <p className="font-display text-sm uppercase tracking-wide mb-3 block" style={{ color: COLORS.accent }}>First time here?</p>
            <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>Enter your name to sign in:</p>
            <div className="flex gap-2">
              <input
                value={newMechanicName}
                onChange={(e) => setNewMechanicName(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && addMechanic()}
                placeholder="Your name"
                className="flex-1 rounded-lg px-4 py-2 text-base focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
                autoFocus
              />
              <Btn onClick={addMechanic}>Sign in</Btn>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ---------- DASHBOARD ----------
  if (screen === 'dashboard') {
    const q = searchQuery.trim().toLowerCase();
    const searchResults = q
      ? orders.filter((o) => {
          const haystack = [
            o.description,
            o.unit,
            o.assignedMechanic,
            o.status,
            ...(o.notes || []).map((n) => n.text),
          ]
            .filter(Boolean)
            .join(' ')
            .toLowerCase();
          return haystack.includes(q);
        })
      : [];
    const openOrders = orders
      .filter((o) => o.status !== 'Done')
      .slice()
      .sort((a, b) => {
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return 0;
      });

    const renderOrderCard = (o) => {
      const isDone = o.status === 'Done';
      return (
        <button
          key={o.id}
          onClick={() => { setActiveUnit(o.unit); setActiveOrderId(o.id); setScreen('order'); setConfirmDelete(false); }}
          style={{ background: isDone ? COLORS.line : COLORS.manila, color: isDone ? COLORS.inkDim : COLORS.ink2 }}
          className="relative rounded-lg p-5 pl-8 text-left w-full focus:outline-none focus:ring-2 transition-all hover:scale-102 active:scale-98"
        >
          <PunchHole bg={isDone ? COLORS.line : COLORS.manila} />
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <p className="font-mono text-xs mb-1 font-semibold" style={{ color: isDone ? COLORS.line : '#5B5342' }}>{o.unit}</p>
              <p className="font-body font-semibold text-base leading-snug mb-2">{o.description || '(no description)'}</p>
              <div className="flex flex-wrap items-center gap-4 font-mono text-xs" style={{ color: isDone ? COLORS.line : '#5B5342', opacity: isDone ? 0.6 : 1 }}>
                {o.assignedMechanic && <span>👤 {o.assignedMechanic}</span>}
                {o.dueDate && <span>📅 {fmtDate(o.dueDate)}</span>}
              </div>
            </div>
            <StatusStamp status={o.status} small />
          </div>
        </button>
      );
    };

    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <ClockInPromptOverlay
          show={showClockInPrompt}
          mechanic={currentMechanic}
          onClockIn={async () => {
            setShowClockInPrompt(false);
            await clockIn();
          }}
          onSkip={() => setShowClockInPrompt(false)}
        />
        <div className="max-w-5xl mx-auto">
          <div className="flex items-start justify-between mb-10">
            <div>
              <p className="font-display text-xs uppercase tracking-[0.3em] mb-2" style={{ color: COLORS.accent }}>Harder Contracting</p>
              <h1 className="font-display text-3xl sm:text-4xl font-bold">Board</h1>
            </div>
            <div className="flex items-center gap-3 flex-wrap justify-end">
              {isAdmin && (
                <button
                  onClick={() => setScreen('timesheets')}
                  className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                  style={{ color: COLORS.accent, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
                >
                  📊 Timesheets
                </button>
              )}
              {isAdmin && (
                <button
                  onClick={() => setScreen('team')}
                  className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                  style={{ color: COLORS.accent, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
                >
                  ⚙️ Team
                </button>
              )}
              <button
                onClick={() => setScreen('checklists')}
                className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                style={{ color: COLORS.accent, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
              >
                📋 Checklists
              </button>
              <button
                onClick={() => { setCurrentMechanic(null); setScreen('login'); setShowClockInPrompt(false); }}
                className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                style={{ color: COLORS.inkDim, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
              >
                👤 {currentMechanic}
              </button>
            </div>
          </div>

          <JokeBanner />

          <div className="flex items-center justify-end gap-4 -mt-2 mb-8">
            <button onClick={startChangePin} className="text-xs underline" style={{ color: COLORS.inkDim }}>
              Change PIN
            </button>
            <button onClick={toggleBiometric} className="text-xs underline" style={{ color: COLORS.inkDim }}>
              {localStorage.getItem('webauthn_cred_' + currentMechanic) ? 'Turn off Face/Touch ID' : 'Enable Face/Touch ID'}
            </button>
            {bioMsg && <span className="text-xs font-semibold" style={{ color: COLORS.accent }}>{bioMsg}</span>}
          </div>

          <button
            onClick={() => setScreen('timeclock')}
            className="w-full flex items-center justify-between rounded-2xl px-6 py-6 mb-8 transition-all hover:scale-102 active:scale-98 focus:outline-none focus:ring-2 shop-card"
            style={{
              background: openEntry ? COLORS.accent : COLORS.surface,
              border: `3px solid ${openEntry ? COLORS.accent : COLORS.line}`,
            }}
          >
            <div className="flex items-center gap-4">
              <span style={{ fontSize: '2.5rem' }}>⏱️</span>
              <div className="text-left">
                <p
                  className="font-display text-xl font-bold"
                  style={{ color: openEntry ? '#1B1F19' : COLORS.ink }}
                >
                  {openEntry ? 'Clocked In' : 'Time Clock'}
                </p>
                <p
                  className="text-sm"
                  style={{ color: openEntry ? '#1B1F19' : COLORS.inkDim, opacity: openEntry ? 0.75 : 1 }}
                >
                  {openEntry ? `Since ${fmtTime(openEntry.clockIn)} — tap to clock out or log hours` : 'Tap to clock in for the day'}
                </p>
              </div>
            </div>
            <span style={{ fontSize: '2rem', color: openEntry ? '#1B1F19' : COLORS.inkDim }}>→</span>
          </button>

          <div className="relative mb-8">
            <input
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              placeholder="🔍 Search work orders — a name, a unit, a word like 'brake'…"
              className="w-full rounded-xl px-5 py-4 text-base focus:outline-none focus:ring-2"
              style={{ background: COLORS.surface, color: COLORS.ink, border: `2px solid ${COLORS.line}` }}
            />
            {searchQuery && (
              <button
                onClick={() => setSearchQuery('')}
                className="absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                style={{ color: COLORS.inkDim }}
              >
                ✕
              </button>
            )}
          </div>

          {q ? (
            <div>
              <h2 className="font-display text-lg font-semibold uppercase tracking-wide mb-5">
                {searchResults.length} result{searchResults.length !== 1 ? 's' : ''} for "{searchQuery}"
              </h2>
              {searchResults.length === 0 ? (
                <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
                  <p className="text-base" style={{ color: COLORS.inkDim }}>No work orders match that search.</p>
                </div>
              ) : (
                <div className="space-y-3">{searchResults.map(renderOrderCard)}</div>
              )}
            </div>
          ) : (
            <React.Fragment>
              <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
                <h2 className="font-display text-lg font-semibold uppercase tracking-wide">Open Work Orders</h2>
                <div className="flex gap-2">
                  <button
                    onClick={() => setScreen('machines')}
                    className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                    style={{ color: COLORS.inkDim, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
                  >
                    View by machine
                  </button>
                  <Btn onClick={() => setShowAddOrder((s) => !s)}>+ New Work Order</Btn>
                </div>
              </div>

              {showAddOrder && (
                <NewOrderForm
                  mechanics={mechanics}
                  units={units}
                  onCancel={() => setShowAddOrder(false)}
                  onSubmit={createOrder}
                />
              )}

              {openOrders.length === 0 ? (
                <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
                  <p className="font-body text-base mb-2" style={{ color: COLORS.inkDim }}>All caught up!</p>
                  <p className="font-body text-sm" style={{ color: COLORS.line }}>No open work orders right now.</p>
                </div>
              ) : (
                <div className="space-y-3">{openOrders.map(renderOrderCard)}</div>
              )}
            </React.Fragment>
          )}

          <p className="font-body text-xs mt-12 text-center" style={{ color: COLORS.line }}>All mechanics see the same board in real time</p>
        </div>
      </div>
    );
  }

  // ---------- MACHINES (grouped by unit) ----------
  if (screen === 'machines') {
    const counts = (unit) => {
      const list = orders.filter((o) => o.unit === unit);
      return {
        Open: list.filter((o) => o.status === 'Open').length,
        'In Progress': list.filter((o) => o.status === 'In Progress').length,
        Done: list.filter((o) => o.status === 'Done').length,
      };
    };
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-5xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>

          <div className="flex items-center justify-between mb-5">
            <h2 className="font-display text-lg font-semibold uppercase tracking-wide">Your machines</h2>
            <Btn variant="ghost" onClick={() => setShowAddUnit((s) => !s)}>+ Add machine</Btn>
          </div>

          {showAddUnit && (
            <div className="flex gap-2 mb-5">
              <input
                value={newUnitName}
                onChange={(e) => setNewUnitName(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && addUnit()}
                placeholder="Unit number, e.g. UNIT-104"
                className="flex-1 rounded-sm px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              />
              <Btn onClick={addUnit}>Add</Btn>
            </div>
          )}

          {units.length === 0 ? (
            <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
              <p className="font-body text-base mb-4" style={{ color: COLORS.inkDim }}>No machines added yet</p>
              <p className="font-body text-sm" style={{ color: COLORS.line }}>Tap "Add machine" above to get started</p>
            </div>
          ) : (
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
              {units.map((u) => {
                const c = counts(u);
                const totalJobs = c.Open + c['In Progress'] + c.Done;
                return (
                  <button
                    key={u}
                    onClick={() => { setActiveUnit(u); setScreen('unit'); }}
                    className="text-left rounded-lg p-5 focus:outline-none focus:ring-2 transition-all hover:scale-105 active:scale-95"
                    style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}
                  >
                    <p className="font-mono text-xl font-semibold mb-4 truncate">{u}</p>
                    <div className="space-y-2">
                      <div className="flex items-center justify-between text-sm">
                        <span style={{ color: COLORS.open }}>📋 Open</span>
                        <span className="font-semibold" style={{ color: COLORS.open }}>{c.Open}</span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span style={{ color: COLORS.progress }}>🔧 In progress</span>
                        <span className="font-semibold" style={{ color: COLORS.progress }}>{c['In Progress']}</span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span style={{ color: COLORS.done }}>✓ Done</span>
                        <span className="font-semibold" style={{ color: COLORS.done }}>{c.Done}</span>
                      </div>
                    </div>
                    {totalJobs > 0 && (
                      <div className="mt-3 pt-3 border-t" style={{ borderColor: COLORS.line }}>
                        <span className="text-xs font-display uppercase tracking-wide" style={{ color: COLORS.inkDim }}>
                          {totalJobs} job{totalJobs !== 1 ? 's' : ''} total
                        </span>
                      </div>
                    )}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }


  // ---------- TIME CLOCK ----------
  if (screen === 'timeclock') {
    const myEntries = timesheets
      .filter((t) => t.mechanic === currentMechanic)
      .slice()
      .sort((a, b) => b.date.localeCompare(a.date) || (b.clockIn || '').localeCompare(a.clockIn || ''));
    const onLunch = openEntry && openEntry.lunchStart && !openEntry.lunchEnd;

    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <div className="max-w-2xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>
          <h1 className="font-display text-3xl font-bold mb-2">Time Clock</h1>
          <p className="text-sm mb-8" style={{ color: COLORS.inkDim }}>{currentMechanic}</p>

          {/* Current status card */}
          <div className="rounded-lg p-6 mb-8 text-center" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
            {!openEntry ? (
              <React.Fragment>
                <p className="text-base mb-5" style={{ color: COLORS.inkDim }}>Not clocked in</p>
                <Btn onClick={clockIn}>Clock In</Btn>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <p className="font-mono text-sm mb-1" style={{ color: COLORS.inkDim }}>Clocked in at</p>
                <p className="font-display text-2xl font-bold mb-5">{fmtTime(openEntry.clockIn)}</p>

                {onLunch ? (
                  <React.Fragment>
                    <p className="text-sm mb-4" style={{ color: COLORS.progress }}>☕ On break since {fmtTime(openEntry.lunchStart)}</p>
                    <Btn onClick={endLunch}>End Break</Btn>
                  </React.Fragment>
                ) : (
                  <div className="flex flex-col gap-3 items-center">
                    {openEntry.lunchStart && openEntry.lunchEnd && (
                      <p className="text-xs font-mono" style={{ color: COLORS.inkDim }}>
                        Break: {fmtTime(openEntry.lunchStart)} – {fmtTime(openEntry.lunchEnd)}
                      </p>
                    )}
                    <div className="flex gap-3">
                      {!openEntry.lunchStart && (
                        <Btn variant="ghost" onClick={startLunch}>Start Break</Btn>
                      )}
                      <Btn onClick={attemptClockOut}>Clock Out</Btn>
                    </div>
                  </div>
                )}
              </React.Fragment>
            )}
          </div>

          {lunchPrompt && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.75)' }}>
              <div className="w-full max-w-xs rounded-2xl p-6" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
                <p className="font-display text-lg font-bold mb-3 text-center">No break logged today</p>
                <p className="text-sm mb-5 text-center" style={{ color: COLORS.inkDim }}>
                  Go back and tap "Start Break" / "End Break" if you took one, or confirm you worked straight through.
                </p>
                <div className="flex flex-col gap-2">
                  <Btn variant="ghost" onClick={() => setLunchPrompt(false)}>Go back</Btn>
                  <Btn variant="danger" onClick={() => clockOut(true)}>I worked straight through — clock out</Btn>
                </div>
              </div>
            </div>
          )}

          {/* Jobs worked on today */}
          {openEntry && (
            <div className="mb-8">
              <h2 className="font-display text-lg font-semibold uppercase tracking-wide mb-4">What did you work on?</h2>
              <TimesheetJobsEditor entry={openEntry} onAdd={addTimesheetJob} onRemove={removeTimesheetJob} />
            </div>
          )}

          {/* Past entries */}
          {/* Pick a date range to see total hours worked */}
          <div className="rounded-lg p-5 mb-8" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
            <h2 className="font-display text-sm font-bold uppercase tracking-wide mb-3">How much have I worked?</h2>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <label className="block">
                <span className="text-xs block mb-1" style={{ color: COLORS.inkDim }}>From</span>
                <input
                  type="date"
                  value={mySummaryStart}
                  onChange={(e) => setMySummaryStart(e.target.value)}
                  className="w-full rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                  style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
                />
              </label>
              <label className="block">
                <span className="text-xs block mb-1" style={{ color: COLORS.inkDim }}>To</span>
                <input
                  type="date"
                  value={mySummaryEnd}
                  onChange={(e) => setMySummaryEnd(e.target.value)}
                  className="w-full rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                  style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
                />
              </label>
            </div>
            {mySummaryStart && mySummaryEnd && (
              <p className="font-display text-xl font-bold" style={{ color: COLORS.accent }}>
                {fmtHours(
                  myEntries
                    .filter((e) => e.date >= mySummaryStart && e.date <= mySummaryEnd)
                    .reduce((sum, e) => sum + entryHours(e), 0)
                )} hrs worked
              </p>
            )}
          </div>

          <h2 className="font-display text-lg font-semibold uppercase tracking-wide mb-4">Your recent shifts</h2>
          {myEntries.length === 0 ? (
            <p className="text-sm" style={{ color: COLORS.line }}>No shifts logged yet.</p>
          ) : (
            <div className="space-y-3">
              {myEntries.map((entry) => (
                <TimesheetEntryCard
                  key={entry.id}
                  entry={entry}
                  locked={isWeekApproved(weekStartOf(entry.date))}
                  isEditing={editingEntryId === entry.id}
                  onEdit={() => setEditingEntryId(entry.id)}
                  onCancelEdit={() => setEditingEntryId(null)}
                  onSave={async (patch) => {
                    await updateTimesheetEntry(entry.id, patch);
                    setEditingEntryId(null);
                  }}
                  onAddJob={addTimesheetJob}
                  onRemoveJob={removeTimesheetJob}
                />
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---------- TIMESHEETS (admin only) ----------
  if (screen === 'timesheets') {
    if (!isAdmin) {
      return (
        <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8 flex items-center justify-center">
          {FONT_STYLE}
          <div className="text-center">
            <p className="font-display text-lg font-bold mb-4">Admins only</p>
            <Btn onClick={() => setScreen('dashboard')}>Back to board</Btn>
          </div>
        </div>
      );
    }

    const filtered = timesheets.filter((t) => {
      if (tsFilterMechanic && t.mechanic !== tsFilterMechanic) return false;
      if (tsFilterStart && t.date < tsFilterStart) return false;
      if (tsFilterEnd && t.date > tsFilterEnd) return false;
      return true;
    }).slice().sort((a, b) => b.date.localeCompare(a.date));

    const totalsByMechanic = {};
    filtered.forEach((e) => {
      totalsByMechanic[e.mechanic] = (totalsByMechanic[e.mechanic] || 0) + entryHours(e);
    });

    const emailValue = tsEmailDraft !== null ? tsEmailDraft : (timesheetSettings.email || '');

    const clockedInNow = timesheets.filter((t) => !t.clockOut && t.date === todayStr());

    // Weekly view for the overtime flag + approval workflow
    const baseWeekStart = weekStartOf(todayStr());
    const viewedWeekStart = (() => {
      const d = new Date(baseWeekStart + 'T00:00:00');
      d.setDate(d.getDate() + tsWeekOffset * 7);
      return d.toISOString().slice(0, 10);
    })();
    const viewedWeekEnd = weekEndOf(viewedWeekStart);
    const weekEntries = timesheets.filter((t) => t.date >= viewedWeekStart && t.date <= viewedWeekEnd);
    const weekTotalsByMechanic = {};
    weekEntries.forEach((e) => {
      weekTotalsByMechanic[e.mechanic] = (weekTotalsByMechanic[e.mechanic] || 0) + entryHours(e);
    });
    const weekApproved = isWeekApproved(viewedWeekStart);

    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <div className="max-w-3xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>
          <h1 className="font-display text-3xl font-bold mb-8">Timesheets</h1>

          {/* Who's clocked in right now */}
          <div className="rounded-lg p-5 mb-8" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
            <h2 className="font-display text-sm font-bold uppercase tracking-wide mb-3">Clocked in right now</h2>
            {clockedInNow.length === 0 ? (
              <p className="text-sm" style={{ color: COLORS.line }}>Nobody's clocked in at the moment.</p>
            ) : (
              <div className="space-y-2">
                {clockedInNow.map((t) => (
                  <div key={t.id} className="flex items-center justify-between">
                    <span className="font-display font-semibold">🟢 {t.mechanic}</span>
                    <span className="font-mono text-sm" style={{ color: COLORS.inkDim }}>
                      since {fmtTime(t.clockIn)}{t.lunchStart && !t.lunchEnd ? ' (on break)' : ''}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Weekly totals, overtime flag, and approval */}
          <div className="rounded-lg p-5 mb-8" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
            <div className="flex items-center justify-between mb-4">
              <button onClick={() => setTsWeekOffset(tsWeekOffset - 1)} className="text-lg px-2" style={{ color: COLORS.inkDim }}>←</button>
              <div className="text-center">
                <p className="font-display font-bold">{fmtWeekRange(viewedWeekStart)}</p>
                {weekApproved && (
                  <p className="text-xs font-semibold mt-1" style={{ color: COLORS.done }}>
                    ✓ Approved by {timesheetApprovals[viewedWeekStart].approvedBy}
                  </p>
                )}
              </div>
              <button
                onClick={() => setTsWeekOffset(Math.min(0, tsWeekOffset + 1))}
                disabled={tsWeekOffset >= 0}
                className="text-lg px-2"
                style={{ color: COLORS.inkDim, opacity: tsWeekOffset >= 0 ? 0.3 : 1 }}
              >
                →
              </button>
            </div>

            {Object.keys(weekTotalsByMechanic).length === 0 ? (
              <p className="text-sm text-center mb-4" style={{ color: COLORS.line }}>No shifts this week.</p>
            ) : (
              <div className="space-y-2 mb-4">
                {Object.entries(weekTotalsByMechanic).map(([name, hours]) => (
                  <div key={name} className="flex items-center justify-between py-1">
                    <span className="font-display font-semibold">{name}</span>
                    <span className="font-mono flex items-center gap-2">
                      {hours > 40 && <span title="Over 40 hours">⚠️</span>}
                      <span style={{ color: hours > 40 ? '#E3A23C' : COLORS.ink }}>{fmtHours(hours)} hrs</span>
                    </span>
                  </div>
                ))}
              </div>
            )}

            {weekApproved ? (
              <Btn variant="ghost" onClick={() => unapproveWeek(viewedWeekStart)}>Un-approve this week</Btn>
            ) : (
              <Btn onClick={() => approveWeek(viewedWeekStart)} disabled={Object.keys(weekTotalsByMechanic).length === 0}>
                Approve this week
              </Btn>
            )}
            <p className="text-xs mt-3" style={{ color: COLORS.line }}>
              Approving a week locks it — mechanics can no longer edit shifts within it themselves.
            </p>
          </div>

          {/* Email settings */}
          <div className="rounded-lg p-5 mb-8" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
            <h2 className="font-display text-sm font-bold uppercase tracking-wide mb-3">Report email</h2>
            <div className="flex gap-2 mb-4">
              <input
                value={emailValue}
                onChange={(e) => setTsEmailDraft(e.target.value)}
                placeholder="payroll@yourcompany.com"
                type="email"
                className="flex-1 rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              />
              <Btn
                onClick={async () => {
                  await saveTimesheetSettings({ ...timesheetSettings, email: emailValue });
                  setTsEmailDraft(null);
                }}
              >
                Save
              </Btn>
            </div>
            <label className="flex items-center justify-between gap-3 cursor-pointer">
              <div>
                <span className="text-sm font-semibold block" style={{ color: COLORS.ink }}>Send automatically every week</span>
                <span className="text-xs" style={{ color: COLORS.line }}>Needs one more setup step — ask Claude when you're ready</span>
              </div>
              <input
                type="checkbox"
                checked={!!timesheetSettings.autoEmail}
                onChange={(e) => saveTimesheetSettings({ ...timesheetSettings, autoEmail: e.target.checked })}
                className="w-5 h-5"
                style={{ accentColor: COLORS.accent }}
              />
            </label>
          </div>

          {/* Filters */}
          <div className="rounded-lg p-5 mb-6" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <select
                value={tsFilterMechanic}
                onChange={(e) => setTsFilterMechanic(e.target.value)}
                className="rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              >
                <option value="">Everyone</option>
                {mechanics.map((m) => <option key={m} value={m}>{m}</option>)}
              </select>
              <input
                type="date"
                value={tsFilterStart}
                onChange={(e) => setTsFilterStart(e.target.value)}
                className="rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              />
              <input
                type="date"
                value={tsFilterEnd}
                onChange={(e) => setTsFilterEnd(e.target.value)}
                className="rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              />
            </div>
          </div>

          <div className="flex items-center justify-between mb-4">
            <h2 className="font-display text-lg font-semibold uppercase tracking-wide">Totals</h2>
            <Btn variant="ghost" onClick={() => exportTimesheets(filtered)}>📤 Export & Share</Btn>
          </div>

          {Object.keys(totalsByMechanic).length === 0 ? (
            <p className="text-sm mb-8" style={{ color: COLORS.line }}>No shifts in this range.</p>
          ) : (
            <div className="rounded-lg p-5 mb-8" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
              {Object.entries(totalsByMechanic).map(([name, hours]) => (
                <div key={name} className="flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${COLORS.line}` }}>
                  <span className="font-display font-semibold">{name}</span>
                  <span className="font-mono">{fmtHours(hours)} hrs</span>
                </div>
              ))}
            </div>
          )}

          <h2 className="font-display text-lg font-semibold uppercase tracking-wide mb-4">All shifts</h2>
          {filtered.length === 0 ? (
            <p className="text-sm" style={{ color: COLORS.line }}>Nothing to show yet.</p>
          ) : (
            <div className="space-y-3">
              {filtered.map((entry) => (
                <div key={entry.id} className="rounded-lg p-4" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-display font-semibold">{entry.mechanic}</span>
                    <span className="font-mono text-sm" style={{ color: COLORS.inkDim }}>{fmtDate(entry.date)}</span>
                  </div>
                  <div className="flex flex-wrap gap-4 text-xs font-mono mb-2" style={{ color: COLORS.inkDim }}>
                    <span>In {fmtTime(entry.clockIn)}</span>
                    <span>Out {entry.clockOut ? fmtTime(entry.clockOut) : '—'}</span>
                    {entry.lunchStart && entry.lunchEnd && <span>Break {fmtTime(entry.lunchStart)}–{fmtTime(entry.lunchEnd)}</span>}
                    {entry.skippedLunch && <span>No break taken</span>}
                    <span className="font-bold" style={{ color: COLORS.accent }}>{fmtHours(entryHours(entry))} hrs</span>
                  </div>
                  {(entry.jobs || []).length > 0 && (
                    <p className="text-xs" style={{ color: COLORS.line }}>
                      {entry.jobs.map((j) => `${j.unit} (${j.hours}h)`).join(' • ')}
                    </p>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---------- TEAM (admin only) ----------
  if (screen === 'team') {
    if (!isAdmin) {
      return (
        <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8 flex items-center justify-center">
          {FONT_STYLE}
          <div className="text-center">
            <p className="font-display text-lg font-bold mb-4">Admins only</p>
            <Btn onClick={() => setScreen('dashboard')}>Back to board</Btn>
          </div>
        </div>
      );
    }
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <div className="max-w-2xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>
          <h1 className="font-display text-3xl font-bold mb-2">Team</h1>
          <p className="text-sm mb-8" style={{ color: COLORS.inkDim }}>
            Manage who can sign in, and who has admin access like you.
          </p>

          <div className="space-y-3">
            {mechanics.map((m) => {
              const isSelf = m === currentMechanic;
              const mIsAdmin = admins.includes(m);
              return (
                <div key={m} className="rounded-lg p-4" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
                  <div className="flex items-center justify-between gap-3 mb-3">
                    <div className="flex items-center gap-2">
                      <p className="font-display font-bold text-lg">{m}</p>
                      {mIsAdmin && (
                        <span
                          className="text-xs font-display font-bold uppercase tracking-wide px-2 py-0.5 rounded-full"
                          style={{ background: COLORS.accent, color: '#1B1F19' }}
                        >
                          Admin
                        </span>
                      )}
                      {isSelf && <span className="text-xs" style={{ color: COLORS.inkDim }}>(you)</span>}
                    </div>
                  </div>

                  {showRemoveConfirm === m ? (
                    <div className="flex flex-wrap items-center gap-2">
                      <span className="text-sm" style={{ color: COLORS.inkDim }}>Remove {m}? Their past work orders stay on record.</span>
                      <Btn variant="danger" onClick={() => removeMechanic(m)}>Yes, remove</Btn>
                      <Btn variant="ghost" onClick={() => setShowRemoveConfirm(null)}>Cancel</Btn>
                    </div>
                  ) : (
                    <div className="flex gap-2">
                      {!isSelf && (
                        <button
                          onClick={() => toggleAdmin(m)}
                          className="text-xs font-display uppercase tracking-wider font-semibold px-3 py-2 rounded-lg"
                          style={{ color: COLORS.inkDim, background: COLORS.surfaceRaised, border: `1px solid ${COLORS.line}` }}
                        >
                          {mIsAdmin ? 'Remove admin' : 'Make admin'}
                        </button>
                      )}
                      {!isSelf && (
                        <button
                          onClick={() => setShowRemoveConfirm(m)}
                          className="text-xs font-display uppercase tracking-wider font-semibold px-3 py-2 rounded-lg"
                          style={{ color: '#E07A5F', background: COLORS.surfaceRaised, border: `1px solid ${COLORS.line}` }}
                        >
                          Remove from team
                        </button>
                      )}
                      {isSelf && (
                        <span className="text-xs" style={{ color: COLORS.line }}>Ask another admin to change your access</span>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ---------- CHECKLIST TEMPLATES ----------
  if (screen === 'checklists') {
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-3xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
