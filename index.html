            ← Back to board
          </button>
          <div className="flex items-center justify-between mb-8">
            <h1 className="font-display text-3xl font-bold">Checklists</h1>
            <Btn onClick={() => setShowNewTemplate((s) => !s)}>+ New checklist</Btn>
          </div>

          {showNewTemplate && (
            <NewTemplateForm onCancel={() => setShowNewTemplate(false)} onSubmit={addTemplate} />
          )}

          {templates.length === 0 ? (
            <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
              <p className="text-base mb-2" style={{ color: COLORS.inkDim }}>No custom checklists yet</p>
              <p className="text-sm" style={{ color: COLORS.line }}>Tap "+ New checklist" above, or use the built-in templates when creating a work order.</p>
            </div>
          ) : (
            <div className="space-y-4">
              {templates.map((t) => {
                const isDefault = ['buncher-b4', 'excavator-ex1', 'crawler', 'processor', 'skidder'].includes(t.id);
                if (editingTemplateId === t.id) {
                  return (
                    <NewTemplateForm
                      key={t.id}
                      isEdit
                      initialName={t.name}
                      initialItemsText={t.items.join('\n')}
                      onCancel={() => setEditingTemplateId(null)}
                      onSubmit={(name, itemsText) => updateTemplate(t.id, name, itemsText)}
                    />
                  );
                }
                return (
                  <div key={t.id} className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
                    <div className="flex items-start justify-between gap-3 mb-3">
                      <div className="flex-1">
                        <p className="font-display font-bold text-lg">{t.name}</p>
                        <p className="text-sm" style={{ color: COLORS.line }}>{t.items.length} steps</p>
                      </div>
                      <div className="flex gap-3">
                        <button
                          onClick={() => setEditingTemplateId(t.id)}
                          className="text-xs font-display uppercase tracking-wider hover:opacity-70"
                          style={{ color: COLORS.accent }}
                        >
                          Edit
                        </button>
                        {!isDefault && (
                          <button 
                            onClick={() => setConfirmDeleteTemplate(confirmDeleteTemplate === t.id ? null : t.id)} 
                            className="text-xs font-display uppercase tracking-wider hover:opacity-70"
                            style={{ color: '#D6604A' }}
                          >
                            {confirmDeleteTemplate === t.id ? '✕ Close' : 'Delete'}
                          </button>
                        )}
                      </div>
                    </div>
                    <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>
                      {t.items.slice(0, 3).join(' • ')}
                      {t.items.length > 3 ? ' • …' : ''}
                    </p>
                    {confirmDeleteTemplate === t.id && !isDefault && (
                      <div className="mt-3 pt-3 border-t" style={{ borderColor: COLORS.line }}>
                        <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>Are you sure? You can't undo this.</p>
                        <Btn variant="danger" onClick={() => deleteTemplate(t.id)}>Yes, delete this checklist</Btn>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---------- UNIT VIEW ----------
  if (screen === 'unit') {
    const unitOrders = orders.filter((o) => o.unit === activeUnit).sort((a, b) => (a.status === 'Done') - (b.status === 'Done'));
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-3xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>
          <div className="flex items-center justify-between mb-8">
            <h1 className="font-mono text-3xl font-bold">{activeUnit}</h1>
            <Btn onClick={() => setShowAddOrder((s) => !s)}>+ New job</Btn>
          </div>

          {showAddOrder && (
            <NewOrderForm
              mechanics={mechanics}
              units={units}
              lockUnit={activeUnit}
              onCancel={() => setShowAddOrder(false)}
              onSubmit={createOrder}
            />
          )}

          {unitOrders.length === 0 ? (
            <div className="rounded-lg p-10 text-center mt-6" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
              <p className="text-base mb-2" style={{ color: COLORS.inkDim }}>All caught up!</p>
              <p className="text-sm" style={{ color: COLORS.line }}>No work orders yet. Tap "+ Work Order" to create one.</p>
            </div>
          ) : (
            <div className="mt-6 space-y-3">
              {unitOrders.map((o) => {
                const isDone = o.status === 'Done';
                return (
                  <button
                    key={o.id}
                    onClick={() => { setActiveOrderId(o.id); setScreen('order'); setConfirmDelete(false); }}
                    style={{ background: isDone ? COLORS.line : COLORS.manila, color: isDone ? COLORS.inkDim : COLORS.ink2 }}
                    className="relative rounded-lg p-5 pl-8 text-left w-full focus:outline-none focus:ring-2 transition-all hover:scale-102 active:scale-98"
                  >
                    <PunchHole bg={isDone ? COLORS.line : COLORS.manila} />
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex-1 min-w-0">
                        <p className="font-body font-semibold text-base leading-snug mb-2">{o.description || '(no description)'}</p>
                        <div className="flex flex-wrap items-center gap-4 font-mono text-xs" style={{ color: isDone ? COLORS.line : '#5B5342', opacity: isDone ? 0.6 : 1 }}>
                          {o.assignedMechanic && <span>👤 {o.assignedMechanic}</span>}
                          {o.hours && o.hours !== '' && <span>⏱️ {o.hours}h</span>}
                          {o.dueDate && <span>📅 {fmtDate(o.dueDate)}</span>}
                        </div>
                        {o.checklist && (
                          <div className="mt-2 text-xs font-semibold" style={{ color: isDone ? COLORS.line : COLORS.accent }}>
                            ✓ {o.checklist.items.filter((i) => i.checked).length}/{o.checklist.items.length} checklist items done
                          </div>
                        )}
                      </div>
                      <StatusStamp status={o.status} small />
                    </div>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---------- ORDER DETAIL ----------
  if (screen === 'order') {
    const order = orders.find((o) => o.id === activeOrderId);
    if (!order) {
      setScreen('unit');
      return null;
    }
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-2xl mx-auto">
          <div className="flex items-center justify-between mb-6 no-print">
            <button onClick={() => setScreen('unit')} className="font-display text-xs uppercase tracking-wider focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
              ← Back to {activeUnit}
            </button>
            <button
              onClick={() => window.print()}
              className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
              style={{ color: COLORS.accent, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
            >
              🖨️ Print
            </button>
          </div>

          <div id="printable-order" style={{ background: COLORS.manila, color: COLORS.ink2 }} className="relative rounded-lg p-7 pl-10 shadow-lg">
            <PunchHole />
            <div className="flex items-start justify-between mb-4 gap-3">
              <p className="font-mono text-xs" style={{ color: '#5B5342' }}>
                {activeUnit} · opened {fmtDate(order.dateCreated)} by {order.createdBy}
              </p>
              <StatusStamp status={order.status} />
            </div>

            <label className="block mb-4">
              <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Issue description</span>
              <textarea
                value={order.description}
                onChange={(e) => updateOrder(order.id, { description: e.target.value })}
                rows={3}
                className="w-full rounded-sm px-3 py-2 text-sm font-body focus:outline-none focus:ring-2"
                style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
              />
            </label>

            <div className="grid grid-cols-2 gap-3 mb-4">
              <label className="block">
                <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Assigned mechanic</span>
                <select
                  value={order.assignedMechanic || ''}
                  onChange={(e) => updateOrder(order.id, { assignedMechanic: e.target.value })}
                  className="w-full rounded-sm px-3 py-2 text-sm font-body focus:outline-none focus:ring-2"
                  style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
                >
                  <option value="">Unassigned</option>
                  {mechanics.map((m) => <option key={m} value={m}>{m}</option>)}
                </select>
              </label>
              <label className="block">
                <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Machine hours</span>
                <input
                  type="number"
                  value={order.hours || ''}
                  onChange={(e) => updateOrder(order.id, { hours: e.target.value })}
                  className="w-full rounded-sm px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                  style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
                />
              </label>
            </div>

            <label className="block mb-5">
              <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Due date</span>
              <input
                type="date"
                value={order.dueDate || ''}
                onChange={(e) => updateOrder(order.id, { dueDate: e.target.value })}
                className="w-full sm:w-1/2 rounded-sm px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
              />
            </label>

            <div className="mb-2">
              <span className="font-display text-xs uppercase tracking-wider block mb-2" style={{ color: '#6B6250' }}>Status</span>
              <div className="flex gap-2">
                {STATUSES.map((s) => (
                  <button
                    key={s}
                    onClick={() => updateOrder(order.id, { status: s })}
                    className="font-display text-xs uppercase font-semibold tracking-wide px-3 py-1.5 rounded-sm focus:outline-none focus:ring-2"
                    style={{
                      border: `2px solid ${statusColor(s)}`,
                      color: order.status === s ? COLORS.ink2 : statusColor(s),
                      background: order.status === s ? statusColor(s) : 'transparent',
                    }}
                  >
                    {s}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="mt-8">
            <h3 className="font-display text-lg font-bold mb-4">Checklists</h3>

            {getChecklists(order).length > 0 && (
              <div className="space-y-4 mb-4">
                {getChecklists(order).map((c) => (
                  editingOrderChecklistId === c.id ? (
                    <OrderChecklistEditForm
                      key={c.id}
                      checklist={c}
                      onCancel={() => setEditingOrderChecklistId(null)}
                      onSave={(name, itemsText) => updateOrderChecklist(order.id, c.id, name, itemsText)}
                    />
                  ) : (
                  <div key={c.id} className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
                    <div className="flex items-center justify-between mb-4 pb-4" style={{ borderBottomColor: COLORS.line, borderBottomWidth: '1px' }}>
                      <p className="font-display font-semibold" style={{ color: COLORS.accent }}>
                        {c.templateName}
                      </p>
                      <div className="flex items-center gap-3">
                        <span className="font-mono text-sm font-bold" style={{ color: COLORS.accent }}>
                          {c.items.filter((i) => i.checked).length}/{c.items.length}
                        </span>
                        <button
                          onClick={() => setEditingOrderChecklistId(c.id)}
                          className="text-xs font-display uppercase tracking-wider hover:opacity-70"
                          style={{ color: COLORS.accent }}
                        >
                          Edit
                        </button>
                        <button
                          onClick={() => detachChecklist(order.id, c.id)}
                          className="text-xs font-display uppercase tracking-wider hover:opacity-70"
                          style={{ color: '#D6604A' }}
                        >
                          Remove
                        </button>
                      </div>
                    </div>
                    <div className="space-y-3">
                      {c.items.map((it) => (
                        <label key={it.id} className="flex items-start gap-3 cursor-pointer group">
                          <input
                            type="checkbox"
                            checked={it.checked}
                            onChange={() => toggleChecklistItem(order.id, c.id, it.id)}
                            className="mt-1 w-5 h-5 rounded focus:outline-none focus:ring-2 cursor-pointer"
                            style={{ accentColor: COLORS.accent }}
                          />
                          <div className="flex-1">
                            <span className="text-base" style={{ color: it.checked ? COLORS.line : COLORS.ink, textDecoration: it.checked ? 'line-through' : 'none' }}>
                              {it.text}
                            </span>
                            {it.checked && it.checkedBy && (
                              <span className="block font-mono text-xs mt-1" style={{ color: COLORS.line }}>
                                ✓ {it.checkedBy} on {new Date(it.checkedAt).toLocaleDateString()}
                              </span>
                            )}
                          </div>
                        </label>
                      ))}
                    </div>
                  </div>
                  )
                ))}
              </div>
            )}

            <div className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
              {templates.length > 0 && !showAdHocChecklist && (
                <div className="mb-4">
                  <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>
                    {getChecklists(order).length > 0 ? 'Add another checklist to this job:' : 'Pick a checklist to use for this job:'}
                  </p>
                  <div className="flex gap-2">
                    <select
                      value={attachTemplateId}
                      onChange={(e) => setAttachTemplateId(e.target.value)}
                      className="flex-1 rounded-lg px-4 py-2 text-base focus:outline-none focus:ring-2"
                      style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
                    >
                      <option value="">Select a checklist…</option>
                      {templates.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                    <Btn disabled={!attachTemplateId} onClick={() => attachChecklist(order.id, attachTemplateId)}>Add</Btn>
                  </div>
                </div>
              )}

              {!showAdHocChecklist ? (
                <button
                  onClick={() => setShowAdHocChecklist(true)}
                  className="text-sm underline"
                  style={{ color: COLORS.accent }}
                >
                  + Create a checklist just for this job
                </button>
              ) : (
                <AdHocChecklistForm
                  onCancel={() => setShowAdHocChecklist(false)}
                  onSubmit={async (name, itemsText, saveAsTemplate) => {
                    await createAdHocChecklist(order.id, name, itemsText, saveAsTemplate);
                    setShowAdHocChecklist(false);
                  }}
                />
              )}
            </div>
          </div>

          <PhotosSection
            order={order}
            onAdd={(dataUrls) => addPhotos(order.id, dataUrls)}
            onRemove={(photoId) => removePhoto(order.id, photoId)}
          />

          <div className="mt-8">
            <h3 className="font-display text-lg font-bold mb-4">Notes & Updates</h3>
            <div className="space-y-3 mb-5">
              {(order.notes || []).length === 0 && (
                <p className="text-sm text-center py-4" style={{ color: COLORS.line }}>No notes yet. Add one to keep the team in the loop.</p>
              )}
              {(order.notes || []).slice().reverse().map((n) => (
                <NoteCard
                  key={n.id}
                  note={n}
                  isEditing={editingNoteId === n.id}
                  canEdit={n.author === currentMechanic || isAdmin}
                  onEdit={() => setEditingNoteId(n.id)}
                  onCancel={() => setEditingNoteId(null)}
                  onSave={(text) => updateNote(order.id, n.id, text)}
                />
              ))}
            </div>
            <NoteForm onSubmit={(text) => addNote(order.id, text)} />
          </div>

          <div className="mt-8 flex justify-end">
            {!confirmDelete ? (
              <Btn variant="danger" onClick={() => setConfirmDelete(true)}>Delete work order</Btn>
            ) : (
              <div className="flex items-center gap-2">
                <span className="text-sm" style={{ color: COLORS.inkDim }}>Delete this work order for good?</span>
                <Btn variant="danger" onClick={() => deleteOrder(order.id)}>Yes, delete</Btn>
                <Btn variant="ghost" onClick={() => setConfirmDelete(false)}>Cancel</Btn>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

function NewTemplateForm({ onSubmit, onCancel, initialName, initialItemsText, isEdit }) {
  const [name, setName] = useState(initialName || '');
  const [itemsText, setItemsText] = useState(initialItemsText || '');
  return (
    <div className="rounded-lg p-6 mb-6" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
      <h3 className="font-display text-lg font-bold mb-4">{isEdit ? 'Edit checklist' : 'Create a new checklist'}</h3>
      <TextField label="What's this checklist for?" value={name} onChange={setName} placeholder="e.g. Engine rebuild, Pre-shift inspection" helper="Give it a clear, descriptive name" />
      <label className="block mb-4">
        <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Steps to complete</span>
        <span className="text-xs block mb-2" style={{ color: COLORS.inkDim }}>Type one step per line. Example:</span>
        <textarea
          value={itemsText}
          onChange={(e) => setItemsText(e.target.value)}
          rows={10}
          placeholder={'Change engine oil\nReplace air filter\nCheck coolant level\nInspect for leaks\nTest engine'}
          className="w-full rounded-lg px-4 py-3 text-base font-body focus:outline-none focus:ring-2 resize-none"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
      </label>
      <div className="flex gap-2">
        <Btn onClick={() => name.trim() && itemsText.trim() && onSubmit(name, itemsText)}>{isEdit ? 'Save changes' : 'Save checklist'}</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  );
}

function TimesheetJobsEditor({ entry, onAdd, onRemove }) {
  const [unit, setUnit] = useState('');
  const [hours, setHours] = useState('');

  return (
    <div className="rounded-lg p-5" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
      {(entry.jobs || []).length > 0 && (
        <div className="space-y-2 mb-4">
          {entry.jobs.map((j) => (
            <div key={j.id} className="flex items-center justify-between rounded-lg px-4 py-2.5" style={{ background: COLORS.surfaceRaised }}>
              <span className="font-mono text-sm">{j.unit} — {j.hours}h</span>
              <button onClick={() => onRemove(entry.id, j.id)} className="text-sm" style={{ color: '#E07A5F' }}>✕</button>
            </div>
          ))}
        </div>
      )}
      <div className="flex gap-2">
        <input
          value={unit}
          onChange={(e) => setUnit(e.target.value)}
          placeholder="Unit # or job (e.g. Labour, Shop cleanup)"
          className="flex-1 rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
        <input
          value={hours}
          onChange={(e) => setHours(e.target.value)}
          placeholder="Hrs"
          type="number"
          step="0.25"
          className="w-20 rounded-lg px-3 py-2.5 text-base font-mono focus:outline-none focus:ring-2"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
        <Btn
          onClick={() => {
            if (unit.trim() && parseFloat(hours) > 0) {
              onAdd(entry.id, unit, hours);
              setUnit('');
              setHours('');
            }
          }}
        >
          Add
        </Btn>
      </div>
    </div>
  );
}

function TimesheetEntryCard({ entry, locked, isEditing, onEdit, onCancelEdit, onSave, onAddJob, onRemoveJob }) {
  const toLocalInput = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const [clockIn, setClockIn] = useState(toLocalInput(entry.clockIn));
  const [clockOut, setClockOut] = useState(toLocalInput(entry.clockOut));
  const [lunchStart, setLunchStart] = useState(toLocalInput(entry.lunchStart));
  const [lunchEnd, setLunchEnd] = useState(toLocalInput(entry.lunchEnd));

  if (isEditing) {
    return (
      <div className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px solid ${COLORS.accent}` }}>
        <p className="font-display font-semibold mb-4">{fmtDate(entry.date)}</p>
        <div className="grid grid-cols-2 gap-3 mb-3">
          <label className="block">
            <span className="text-xs block mb-1" style={{ color: COLORS.inkDim }}>Clock in</span>
            <input type="datetime-local" value={clockIn} onChange={(e) => setClockIn(e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2" style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }} />
          </label>
          <label className="block">
            <span className="text-xs block mb-1" style={{ color: COLORS.inkDim }}>Clock out</span>
            <input type="datetime-local" value={clockOut} onChange={(e) => setClockOut(e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2" style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }} />
          </label>
          <label className="block">
            <span className="text-xs block mb-1" style={{ color: COLORS.inkDim }}>Break start</span>
            <input type="datetime-local" value={lunchStart} onChange={(e) => setLunchStart(e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2" style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }} />
          </label>
          <label className="block">
            <span className="text-xs block mb-1" style={{ color: COLORS.inkDim }}>Break end</span>
            <input type="datetime-local" value={lunchEnd} onChange={(e) => setLunchEnd(e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2" style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }} />
          </label>
        </div>
        <TimesheetJobsEditor entry={entry} onAdd={onAddJob} onRemove={onRemoveJob} />
        <div className="flex gap-2 mt-4">
          <Btn
            onClick={() =>
              onSave({
                clockIn: clockIn ? new Date(clockIn).toISOString() : null,
                clockOut: clockOut ? new Date(clockOut).toISOString() : null,
                lunchStart: lunchStart ? new Date(lunchStart).toISOString() : null,
                lunchEnd: lunchEnd ? new Date(lunchEnd).toISOString() : null,
              })
            }
          >
            Save changes
          </Btn>
          <Btn variant="ghost" onClick={onCancelEdit}>Cancel</Btn>
        </div>
      </div>
    );
  }

  return (
    <div className="rounded-lg p-4" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
      <div className="flex items-center justify-between mb-2">
        <span className="font-display font-semibold">{fmtDate(entry.date)}</span>
        {locked ? (
          <span className="text-xs font-semibold" style={{ color: COLORS.done }}>🔒 Approved</span>
        ) : (
          <button onClick={onEdit} className="text-xs underline" style={{ color: COLORS.accent }}>Edit</button>
        )}
      </div>
      <div className="flex flex-wrap gap-4 text-xs font-mono mb-2" style={{ color: COLORS.inkDim }}>
        <span>In {fmtTime(entry.clockIn)}</span>
        <span>Out {entry.clockOut ? fmtTime(entry.clockOut) : '—'}</span>
        {entry.lunchStart && entry.lunchEnd && <span>Break {fmtTime(entry.lunchStart)}–{fmtTime(entry.lunchEnd)}</span>}
        {entry.skippedLunch && <span>No break taken</span>}
        {entry.clockOut && <span className="font-bold" style={{ color: COLORS.accent }}>{fmtHours(entryHours(entry))} hrs</span>}
      </div>
      {(entry.jobs || []).length > 0 && (
        <p className="text-xs" style={{ color: COLORS.line }}>
          {entry.jobs.map((j) => `${j.unit} (${j.hours}h)`).join(' • ')}
        </p>
      )}
    </div>
  );
}

function OrderChecklistEditForm({ checklist, onSave, onCancel }) {
  const [name, setName] = useState(checklist.templateName);
  const [itemsText, setItemsText] = useState(checklist.items.map((i) => i.text).join('\n'));
  const canSave = name.trim() && itemsText.trim();

  return (
    <div className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px solid ${COLORS.accent}` }}>
      <h3 className="font-display text-lg font-bold mb-4">Edit checklist</h3>
      <TextField label="Checklist name" value={name} onChange={setName} />
      <label className="block mb-4">
        <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Steps</span>
        <span className="text-xs block mb-2" style={{ color: COLORS.inkDim }}>
          One step per line. Checked-off items stay checked as long as the wording doesn't change.
        </span>
        <textarea
          value={itemsText}
          onChange={(e) => setItemsText(e.target.value)}
          rows={8}
          className="w-full rounded-lg px-4 py-3 text-base font-body focus:outline-none focus:ring-2 resize-none"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
      </label>
      <div className="flex gap-2">
        <Btn disabled={!canSave} onClick={() => onSave(name, itemsText)}>Save changes</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  );
}

function AdHocChecklistForm({ onSubmit, onCancel }) {
  const [name, setName] = useState('');
  const [itemsText, setItemsText] = useState('');
  const [saveAsTemplate, setSaveAsTemplate] = useState(false);
  const canSubmit = name.trim() && itemsText.trim();

  return (
    <div className="mt-4 pt-4" style={{ borderTop: `1px solid ${COLORS.line}` }}>
      <TextField label="What's this checklist for?" value={name} onChange={setName} placeholder="e.g. Off-season transmission rebuild" />
      <label className="block mb-4">
        <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Steps to complete</span>
        <span className="text-xs block mb-2" style={{ color: COLORS.inkDim }}>Type one step per line</span>
        <textarea
          value={itemsText}
          onChange={(e) => setItemsText(e.target.value)}
          rows={6}
          placeholder={'Drain transmission fluid\nRemove pan and inspect\nReplace filter\nRefill and torque test'}
          className="w-full rounded-lg px-4 py-3 text-base font-body focus:outline-none focus:ring-2 resize-none"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
      </label>
      <label className="flex items-center gap-2 mb-4 cursor-pointer">
        <input
          type="checkbox"
          checked={saveAsTemplate}
          onChange={(e) => setSaveAsTemplate(e.target.checked)}
          className="w-4 h-4"
          style={{ accentColor: COLORS.accent }}
        />
        <span className="text-sm" style={{ color: COLORS.inkDim }}>Also save this to the checklist library for future jobs</span>
      </label>
      <div className="flex gap-2">
        <Btn disabled={!canSubmit} onClick={() => onSubmit(name, itemsText, saveAsTemplate)}>Add to this job</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  );
}

function NewOrderForm({ mechanics, units, onSubmit, onCancel, lockUnit }) {
  const [description, setDescription] = useState('');
  const [assignedMechanic, setAssignedMechanic] = useState('');
  const [hours, setHours] = useState('');
  const [dueDate, setDueDate] = useState('');
  const [unit, setUnit] = useState(lockUnit || '');
  const [addingNewUnit, setAddingNewUnit] = useState(false);
  const [newUnitName, setNewUnitName] = useState('');

  const handleUnitChange = (val) => {
    if (val === '__new__') {
      setAddingNewUnit(true);
      setUnit('');
    } else {
      setAddingNewUnit(false);
      setUnit(val);
    }
  };

  const finalUnit = addingNewUnit ? newUnitName.trim() : unit;
  const canSubmit = description.trim() && finalUnit;

  return (
    <div className="rounded-lg p-6 mb-6" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
      <h3 className="font-display text-lg font-bold mb-4">Create a work order</h3>

      {!lockUnit && (
        <label className="block mb-4">
          <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Which machine?</span>
          {!addingNewUnit ? (
            <select
              value={unit}
              onChange={(e) => handleUnitChange(e.target.value)}
              className="w-full rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2"
              style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
            >
              <option value="">Select a machine…</option>
              {units.map((u) => <option key={u} value={u}>{u}</option>)}
              <option value="__new__">+ Add a new machine…</option>
            </select>
          ) : (
            <div className="flex gap-2">
              <input
                value={newUnitName}
                onChange={(e) => setNewUnitName(e.target.value)}
                placeholder="New machine unit number"
                autoFocus
                className="flex-1 rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2 font-mono"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              />
              <button
                onClick={() => { setAddingNewUnit(false); setNewUnitName(''); }}
                className="px-3 rounded-lg text-sm"
                style={{ color: COLORS.inkDim, border: `1px solid ${COLORS.line}` }}
              >
                Cancel
              </button>
            </div>
          )}
        </label>
      )}

      <TextField label="What needs to be fixed?" value={description} onChange={setDescription} placeholder="e.g. Replace hydraulic pump, Fix leaking hose" helper="Be specific so the mechanic knows what to do" />
      <div className="grid grid-cols-2 gap-4 mb-4">
        <label className="block">
          <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Who's doing this?</span>
          <select
            value={assignedMechanic}
            onChange={(e) => setAssignedMechanic(e.target.value)}
            className="w-full rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2"
            style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
          >
            <option value="">Leave unassigned</option>
            {mechanics.map((m) => <option key={m} value={m}>{m}</option>)}
          </select>
        </label>
        <TextField label="Machine hours" value={hours} onChange={setHours} placeholder="Current hour meter reading" type="number" mono />
      </div>
      <TextField label="When do you need it done?" value={dueDate} onChange={setDueDate} type="date" mono />
      <div className="flex gap-2 mt-6">
        <Btn onClick={() => canSubmit && onSubmit({ unit: finalUnit, description, assignedMechanic, hours, dueDate })} disabled={!canSubmit}>Create job</Btn>
        <Btn variant="ghost" onClick={onCancel}>Nevermind</Btn>
      </div>
    </div>
  );
}

function NoteCard({ note, isEditing, canEdit, onEdit, onCancel, onSave }) {
  const [text, setText] = useState(note.text);

  if (isEditing) {
    return (
      <div className="rounded-lg p-4" style={{ background: COLORS.surface, border: `2px solid ${COLORS.accent}` }}>
        <textarea
          value={text}
          onChange={(e) => setText(e.target.value)}
          rows={3}
          autoFocus
          className="w-full rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 resize-none mb-3"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
        <div className="flex gap-2">
          <Btn onClick={() => text.trim() && onSave(text)} disabled={!text.trim()}>Save</Btn>
          <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        </div>
      </div>
    );
  }

  return (
    <div className="rounded-lg p-4" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
      <div className="flex items-center justify-between mb-2">
        <span className="font-display font-semibold text-sm" style={{ color: COLORS.accent }}>💬 {note.author}</span>
        <div className="flex items-center gap-3">
          <span className="font-mono text-xs" style={{ color: COLORS.line }}>
            {new Date(note.ts).toLocaleString()}{note.edited ? ' (edited)' : ''}
          </span>
          {canEdit && (
            <button onClick={onEdit} className="text-xs underline" style={{ color: COLORS.inkDim }}>Edit</button>
          )}
        </div>
      </div>
      <p className="text-base">{note.text}</p>
    </div>
  );
}

function NoteForm({ onSubmit }) {
  const [text, setText] = useState('');
  return (
    <div className="flex gap-2">
      <textarea
        value={text}
        onChange={(e) => setText(e.target.value)}
        placeholder="What's the status? Any issues? Tips for next shift?"
        rows={2}
        className="flex-1 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 resize-none"
        style={{ background: COLORS.surface, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
      />
      <Btn onClick={() => { onSubmit(text); setText(''); }} disabled={!text.trim()}>Post</Btn>
    </div>
  );
}

function PhotosSection({ order, onAdd, onRemove }) {
  const [uploading, setUploading] = useState(false);
  const [viewerPhoto, setViewerPhoto] = useState(null);
  const media = order.media || [];

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    setUploading(true);
    try {
      const compressed = await Promise.all(files.map((f) => compressImage(f)));
      await onAdd(compressed);
    } catch (err) {
      console.error('photo upload failed', err);
    }
    setUploading(false);
    e.target.value = '';
  };

  return (
    <div className="mt-8 no-print">
      <h3 className="font-display text-lg font-bold mb-4">Photos</h3>

      {media.length > 0 && (
        <div className="grid grid-cols-3 gap-2 mb-4">
          {media.map((m) => (
            <div key={m.id} className="relative aspect-square rounded-lg overflow-hidden" style={{ border: `1px solid ${COLORS.line}` }}>
              <img
                src={m.dataUrl}
                onClick={() => setViewerPhoto(m)}
                className="w-full h-full object-cover cursor-pointer"
                alt="Problem photo"
              />
              <button
                onClick={() => onRemove(m.id)}
                className="absolute top-1 right-1 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold"
                style={{ background: 'rgba(0,0,0,0.6)', color: '#fff' }}
              >
                ✕
              </button>
            </div>
          ))}
        </div>
      )}

      <label
        className="block text-center rounded-lg py-4 cursor-pointer font-display font-semibold uppercase tracking-wide text-sm"
        style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}`, color: COLORS.accent }}
      >
        {uploading ? 'Uploading…' : '📷 Add photos of the problem'}
        <input
          type="file"
          accept="image/*"
          capture="environment"
          multiple
          onChange={handleFiles}
          className="hidden"
          disabled={uploading}
        />
      </label>

      {viewerPhoto && (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4"
          style={{ background: 'rgba(0,0,0,0.9)' }}
          onClick={() => setViewerPhoto(null)}
        >
          <img src={viewerPhoto.dataUrl} className="max-w-full max-h-full rounded-lg" alt="Problem photo full size" />
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
