<!-- On-screen error reporting: if anything fails, show it instead of a blank screen -->
<script>
  window.addEventListener('error', function (e) {
    showFatalError((e.message || 'Script failed to load') + (e.filename ? '\n\nFile: ' + e.filename + (e.lineno ? ':' + e.lineno : '') : ''));
  }, true); // capture:true so we also catch <script src> load failures, not just JS errors
  window.addEventListener('unhandledrejection', function (e) {
    showFatalError('Unhandled error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  function showFatalError(msg) {
    const root = document.getElementById('root');
    if (root.dataset.errorShown) return;
    root.dataset.errorShown = '1';
    root.innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:sans-serif;color:#ECE8DF;background:#1B1E20;text-align:center;">' +
      '<div style="max-width:520px;"><h1 style="color:#E8622C;font-size:1.4rem;">Something went wrong loading the app</h1>' +
      '<p style="margin-top:1rem;">Please screenshot this and send it back:</p>' +
      '<pre style="text-align:left;background:#242829;padding:1rem;border-radius:8px;overflow:auto;font-size:0.75rem;white-space:pre-wrap;">' +
      String(msg).replace(/</g, '&lt;') + '</pre></div></div>';
  }

  // Fallback diagnostic: if nothing has rendered into #root after 6 seconds,
  // report exactly which external libraries loaded and which didn't.
  setTimeout(function () {
    const root = document.getElementById('root');
    if (root.dataset.errorShown) return;
    if (root.children.length > 0) return; // app rendered fine
    const status = window.__loadStatus || {};
    const lines = ['tailwind', 'react', 'react-dom', 'babel', 'firebase-app', 'firebase-db'].map(function (k) {
      return k + ': ' + (status[k] || 'never finished loading');
    });
    showFatalError('The app never finished starting up. Here is what loaded:\n\n' + lines.join('\n'));
  }, 6000);
</script>

// Mirrors the last-known data into localStorage so mechanics can still SEE
// their board (read-only) even opening the app fresh with zero signal.
// New changes made offline still rely on Firebase's own queue-and-sync,
// which only survives as long as the app isn't fully closed before
// reconnecting — this cache is purely for offline viewing, not writes.
function cacheGet(key, fallback) {
  try {
    const raw = localStorage.getItem('cache_' + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function cacheSet(key, value) {
  try {
    localStorage.setItem('cache_' + key, JSON.stringify(value));
  } catch (e) {
    // storage full or unavailable — offline viewing just won't have this data
  }
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

// Resize + compress a photo before storing it, so the shared database stays fast
// to sync over a mechanic's cell signal out in the field.
function compressImage(file, maxDim = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// One-way hash so raw PINs are never stored or sent anywhere in plain text.
async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
}

function webauthnKey(name) {
  return 'webauthn_cred_' + name;
}

async function webauthnAvailable() {
  return !!(
    window.PublicKeyCredential &&
    window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable &&
    (await window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable())
  );
}

// Registers Face ID / Touch ID (or Windows Hello, etc.) as a shortcut on THIS device only.
// The credential never leaves the device — it's just a local unlock, not shared identity proof.
async function registerBiometric(name) {
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const cred = await navigator.credentials.create({
    publicKey: {
      challenge,
      rp: { name: 'Harder Contracting Work Orders' },
      user: {
        id: new TextEncoder().encode(name),
        name,
        displayName: name,
      },
      pubKeyCredParams: [
        { type: 'public-key', alg: -7 },
        { type: 'public-key', alg: -257 },
      ],
      authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
      timeout: 60000,
    },
  });
  const credIdB64 = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
  localStorage.setItem(webauthnKey(name), credIdB64);
}

async function verifyBiometric(name) {
  const credIdB64 = localStorage.getItem(webauthnKey(name));
  if (!credIdB64) return false;
  try {
    const credId = Uint8Array.from(atob(credIdB64), (c) => c.charCodeAt(0));
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ id: credId, type: 'public-key' }],
        userVerification: 'required',
        timeout: 60000,
      },
    });
    return true;
  } catch (e) {
    return false;
  }
}

  const [activeUnit, setActiveUnit] = useState(null);
  const [activeOrderId, setActiveOrderId] = useState(null);
  const [newMechanicName, setNewMechanicName] = useState('');
  const [newUnitName, setNewUnitName] = useState('');
  const [showAddUnit, setShowAddUnit] = useState(false);
  const [showAddOrder, setShowAddOrder] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [templates, setTemplates] = useState(() => cacheGet('templates', []));
  const [showNewTemplate, setShowNewTemplate] = useState(false);
  const [confirmDeleteTemplate, setConfirmDeleteTemplate] = useState(null);
  const [attachTemplateId, setAttachTemplateId] = useState('');
  const [isOnline, setIsOnline] = useState(true);
  const [pins, setPins] = useState({});
  const [pinModal, setPinModal] = useState(null); // { mode: 'verify'|'setup', mechanic, stage, firstEntry }
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState('');
  const [offerBiometric, setOfferBiometric] = useState(null);
  const [bioMsg, setBioMsg] = useState('');
  const [searchQuery, setSearchQuery] = useState('');
  const [admins, setAdmins] = useState([]);
  const [showRemoveConfirm, setShowRemoveConfirm] = useState(null);
  const [editingTemplateId, setEditingTemplateId] = useState(null);
  const [showAdHocChecklist, setShowAdHocChecklist] = useState(false);

  useEffect(() => {
    const connectedRef = firebase.database().ref('.info/connected');
    const onConnected = connectedRef.on('value', (snap) => {
      setIsOnline(snap.val() === true);
    });
    return () => connectedRef.off('value', onConnected);
  }, []);

  useEffect(() => {
    const pinsRef = firebase.database().ref('pins');
    const onPins = pinsRef.on('value', (snap) => {
      setPins(snap.val() || {});
    });
    return () => pinsRef.off('value', onPins);
  }, []);

  useEffect(() => {
    const adminsRef = firebase.database().ref('admins');
    const onAdmins = adminsRef.on('value', (snap) => {
      const val = snap.val();
      if (val && val.length > 0) {
        setAdmins(val);
      } else {
        // Seed the very first admin so someone can always manage the team.
        adminsRef.set(['Joe']);
        setAdmins(['Joe']);
      }
    });
    return () => adminsRef.off('value', onAdmins);
  }, []);

  useEffect(() => {
    if (pinModal && pinInput.length === 4) {
      submitPin();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [pinInput]);

  useEffect(() => {
    const db = firebase.database();
    const metaRef = db.ref('meta');
    const ordersRef = db.ref('orders');
    const templatesRef = db.ref('templates');
    const ready = { meta: false, orders: false, templates: false };
    const checkReady = () => {
      if (ready.meta && ready.orders && ready.templates) setLoading(false);
    };

    const onMeta = metaRef.on('value', (snap) => {
      const meta = snap.val() || { mechanics: [], units: [] };
      setMechanics(meta.mechanics || []);
      setUnits(meta.units || []);
      cacheSet('mechanics', meta.mechanics || []);
      cacheSet('units', meta.units || []);
      ready.meta = true;
      checkReady();
    });
    const onOrders = ordersRef.on('value', (snap) => {
      const val = snap.val() || [];
      setOrders(val);
      cacheSet('orders', val);
      ready.orders = true;
      checkReady();
    });
    const onTemplates = templatesRef.on('value', (snap) => {
      const t = snap.val();
      if (t) {
        setTemplates(t);
        cacheSet('templates', t);
      } else {
        templatesRef.set(DEFAULT_TEMPLATES);
      }
      ready.templates = true;
      checkReady();
    });

    return () => {
      metaRef.off('value', onMeta);
      ordersRef.off('value', onOrders);
      templatesRef.off('value', onTemplates);
    };
  }, []);

  const persistMeta = async (nextMechanics, nextUnits) => {
    setMechanics(nextMechanics);
    setUnits(nextUnits);
    await saveMeta({ mechanics: nextMechanics, units: nextUnits });
  };
  const persistOrders = async (next) => {
    setOrders(next);
    await saveOrders(next);
  };
  const persistTemplates = async (next) => {
    setTemplates(next);
    await saveTemplates(next);
  };

  const persistPins = async (next) => {
    setPins(next);
    await savePins(next);
  };

  const handleMechanicTap = async (name) => {
    setPinError('');
    const hasCred = !!localStorage.getItem('webauthn_cred_' + name);
    if (hasCred) {
      const ok = await verifyBiometric(name);
      if (ok) {
        setCurrentMechanic(name);
        setScreen('dashboard');
        return;
      }
      // if biometric fails or is cancelled, fall through to PIN entry
    }
    setPinInput('');
    if (pins[name]) {
      setPinModal({ mode: 'verify', mechanic: name });
    } else {
      setPinModal({ mode: 'setup', mechanic: name, stage: 'first', firstEntry: '' });
    }
  };

  const submitPin = async () => {
    if (!pinModal || pinInput.length !== 4) return;
    if (pinModal.mode === 'verify') {
      const hash = await sha256Hex(pinInput);
      if (hash === pins[pinModal.mechanic]) {
        const mechanic = pinModal.mechanic;
        setPinModal(null);
        setPinInput('');
        setPinError('');
        setCurrentMechanic(mechanic);
        setScreen('dashboard');
        maybeOfferBiometric(mechanic);
      } else {
        setPinError('Wrong PIN — try again');
        setPinInput('');
      }
    } else if (pinModal.mode === 'setup') {
      if (pinModal.stage === 'first') {
        setPinModal({ ...pinModal, stage: 'confirm', firstEntry: pinInput });
        setPinInput('');
      } else {
        if (pinInput === pinModal.firstEntry) {
          const hash = await sha256Hex(pinInput);
          const nextPins = { ...pins, [pinModal.mechanic]: hash };
          await persistPins(nextPins);
          const mechanic = pinModal.mechanic;
          const isNewMechanic = !mechanics.includes(mechanic);
          setPinModal(null);
          setPinInput('');
          setPinError('');
          if (isNewMechanic) {
            await persistMeta([...mechanics, mechanic], units);
          }
          setCurrentMechanic(mechanic);
          setScreen('dashboard');
          maybeOfferBiometric(mechanic);
        } else {
          setPinError("Those didn't match — start over");
          setPinModal({ ...pinModal, stage: 'first', firstEntry: '' });
          setPinInput('');
        }
      }
    }
  };

  const cancelPinModal = () => {
    setPinModal(null);
    setPinInput('');
    setPinError('');
  };

  const forgotPin = async () => {
    if (!pinModal) return;
    const name = pinModal.mechanic;
    const nextPins = { ...pins };
    delete nextPins[name];
    await persistPins(nextPins);
    localStorage.removeItem('webauthn_cred_' + name);
    setPinModal({ mode: 'setup', mechanic: name, stage: 'first', firstEntry: '' });
    setPinInput('');
    setPinError('');
  };

  const startChangePin = () => {
    setPinError('');
    setPinInput('');
    setPinModal({ mode: 'setup', mechanic: currentMechanic, stage: 'first', firstEntry: '' });
  };

  const maybeOfferBiometric = async (name) => {
    if (localStorage.getItem('webauthn_cred_' + name)) return;
    const avail = await webauthnAvailable().catch(() => false);
    if (avail) setOfferBiometric(name);
  };

  const toggleBiometric = async () => {
    const key = 'webauthn_cred_' + currentMechanic;
    if (localStorage.getItem(key)) {
      localStorage.removeItem(key);
      setBioMsg('Face ID / Touch ID turned off on this device.');
    } else {
      try {
        await registerBiometric(currentMechanic);
        setBioMsg('Face ID / Touch ID enabled on this device.');
      } catch (e) {
        setBioMsg('Could not set that up on this device.');
      }
    }
    setTimeout(() => setBioMsg(''), 4000);
  };

  const addTemplate = async (name, itemsText) => {
    const trimmedName = name.trim();
    const items = itemsText.split('\n').map((l) => l.trim()).filter(Boolean);
    if (!trimmedName || items.length === 0) return;
    const t = { id: uid(), name: trimmedName, items };
    await persistTemplates([...templates, t]);
    setShowNewTemplate(false);
  };

  const deleteTemplate = async (id) => {
    await persistTemplates(templates.filter((t) => t.id !== id));
    setConfirmDeleteTemplate(null);
  };

  const updateTemplate = async (id, name, itemsText) => {
    const trimmedName = name.trim();
    const items = itemsText.split('\n').map((l) => l.trim()).filter(Boolean);
    if (!trimmedName || items.length === 0) return;
    const next = templates.map((t) => (t.id === id ? { ...t, name: trimmedName, items } : t));
    await persistTemplates(next);
    setEditingTemplateId(null);
  };

  const attachChecklist = async (orderId, templateId) => {
    const template = templates.find((t) => t.id === templateId);
    if (!template) return;
    const checklist = {
      templateId: template.id,
      templateName: template.name,
      items: template.items.map((text) => ({ id: uid(), text, checked: false, checkedBy: null, checkedAt: null })),
    };
    await updateOrder(orderId, { checklist });
    setAttachTemplateId('');
  };

  const detachChecklist = async (orderId) => {
    await updateOrder(orderId, { checklist: null });
  };

  const createAdHocChecklist = async (orderId, name, itemsText, saveAsTemplate) => {
    const trimmedName = name.trim();
    const items = itemsText.split('\n').map((l) => l.trim()).filter(Boolean);
    if (!trimmedName || items.length === 0) return;
    const checklist = {
      templateId: null,
      templateName: trimmedName,
      items: items.map((text) => ({ id: uid(), text, checked: false, checkedBy: null, checkedAt: null })),
    };
    await updateOrder(orderId, { checklist });
    if (saveAsTemplate) {
      await persistTemplates([...templates, { id: uid(), name: trimmedName, items }]);
    }
  };

  const toggleChecklistItem = async (orderId, itemId) => {
    const order = orders.find((o) => o.id === orderId);
    if (!order || !order.checklist) return;
    const items = order.checklist.items.map((it) => {
      if (it.id !== itemId) return it;
      const nowChecked = !it.checked;
      return {
        ...it,
        checked: nowChecked,
        checkedBy: nowChecked ? currentMechanic : null,
        checkedAt: nowChecked ? new Date().toISOString() : null,
      };
    });
    await updateOrder(orderId, { checklist: { ...order.checklist, items } });
  };

  const addMechanic = () => {
    const name = newMechanicName.trim();
    if (!name || mechanics.includes(name)) return;
    setNewMechanicName('');
    setPinError('');
    setPinInput('');
    // New mechanics set up a PIN before their name is added to the board —
    // persistMeta happens once PIN setup completes, in submitPin().
    setPinModal({ mode: 'setup', mechanic: name, stage: 'first', firstEntry: '' });
  };

  const isAdmin = admins.includes(currentMechanic);

  const removeMechanic = async (name) => {
    const nextMechanics = mechanics.filter((m) => m !== name);
    await persistMeta(nextMechanics, units);
    const nextPins = { ...pins };
    delete nextPins[name];
    await persistPins(nextPins);
    if (admins.includes(name)) {
      const nextAdmins = admins.filter((a) => a !== name);
      setAdmins(nextAdmins);
      await saveAdmins(nextAdmins);
    }
    setShowRemoveConfirm(null);
  };

  const toggleAdmin = async (name) => {
    const nextAdmins = admins.includes(name) ? admins.filter((a) => a !== name) : [...admins, name];
    setAdmins(nextAdmins);
    await saveAdmins(nextAdmins);
  };

  const addUnit = async () => {
    const name = newUnitName.trim();
    if (!name || units.includes(name)) return;
    await persistMeta(mechanics, [...units, name]);
    setNewUnitName('');
    setShowAddUnit(false);
  };

  const createOrder = async (data) => {
    const unitName = (data.unit || activeUnit || '').trim();
    if (!unitName) return;
    if (!units.includes(unitName)) {
      await persistMeta(mechanics, [...units, unitName]);
    }
    const order = {
      id: uid(),
      unit: unitName,
      description: data.description,
      assignedMechanic: data.assignedMechanic,
      hours: data.hours,
      dueDate: data.dueDate,
      dateCreated: new Date().toISOString().slice(0, 10),
      status: 'Open',
      notes: [],
      createdBy: currentMechanic,
    };
    await persistOrders([order, ...orders]);
    setShowAddOrder(false);
  };

  const updateOrder = async (id, patch) => {
    const next = orders.map((o) => (o.id === id ? { ...o, ...patch } : o));
    await persistOrders(next);
  };

  const addNote = async (id, text) => {
    if (!text.trim()) return;
    const note = { id: uid(), author: currentMechanic, text: text.trim(), ts: new Date().toISOString() };
    const next = orders.map((o) => (o.id === id ? { ...o, notes: [...(o.notes || []), note] } : o));
    await persistOrders(next);
  };

  const addPhotos = async (id, dataUrls) => {
    const photos = dataUrls.map((dataUrl) => ({
      id: uid(),
      dataUrl,
      author: currentMechanic,
      ts: new Date().toISOString(),
    }));
    const next = orders.map((o) => (o.id === id ? { ...o, media: [...(o.media || []), ...photos] } : o));
    await persistOrders(next);
  };

  const removePhoto = async (orderId, photoId) => {
    const next = orders.map((o) =>
      o.id === orderId ? { ...o, media: (o.media || []).filter((m) => m.id !== photoId) } : o
    );
    await persistOrders(next);
  };

  const deleteOrder = async (id) => {
    await persistOrders(orders.filter((o) => o.id !== id));
    setScreen('unit');
    setConfirmDelete(false);
  };

  if (loading) {
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="flex items-center justify-center font-display">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <span className="text-sm uppercase tracking-widest" style={{ color: COLORS.inkDim }}>Loading board…</span>
      </div>
    );
  }

  // ---------- LOGIN ----------
  if (screen === 'login' || !currentMechanic) {
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-6 flex flex-col items-center justify-center">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-md w-full">
          <div className="text-center mb-10">
            <p className="font-display text-sm uppercase tracking-[0.3em] mb-2" style={{ color: COLORS.accent }}>Harder Contracting</p>
            <h1 className="font-display text-4xl font-bold mb-2">Work Order Board</h1>
            <p className="text-base" style={{ color: COLORS.inkDim }}>Pick your name to get started</p>
          </div>

          {mechanics.length > 0 && (
            <div className="mb-8">
              <p className="font-display text-xs uppercase tracking-wider mb-3 block" style={{ color: COLORS.inkDim }}>Tap to sign in</p>
              <div className="grid grid-cols-2 gap-3">
                {mechanics.map((m) => (
                  <button
                    key={m}
                    onClick={() => handleMechanicTap(m)}
                    className="rounded-lg px-4 py-5 font-medium text-center focus:outline-none focus:ring-2 transition-all hover:scale-105 active:scale-95 relative"
                    style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}`, color: COLORS.ink }}
                  >
                    {m}
                    {!!localStorage.getItem('webauthn_cred_' + m) && (
                      <span className="absolute top-1.5 right-2 text-xs" title="Face ID / Touch ID available">🔓</span>
                    )}
                  </button>
                ))}
              </div>
              <div className="h-px my-6" style={{ background: COLORS.line }} />
            </div>
          )}

          <div className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.accent}` }}>
            <p className="font-display text-sm uppercase tracking-wide mb-3 block" style={{ color: COLORS.accent }}>First time here?</p>
            <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>Enter your name to sign in:</p>
            <div className="flex gap-2">
              <input
                value={newMechanicName}
                onChange={(e) => setNewMechanicName(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && addMechanic()}
                placeholder="Your name"
                className="flex-1 rounded-lg px-4 py-2 text-base focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
                autoFocus
              />
              <Btn onClick={addMechanic}>Sign in</Btn>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ---------- DASHBOARD ----------
  if (screen === 'dashboard') {
    const q = searchQuery.trim().toLowerCase();
    const searchResults = q
      ? orders.filter((o) => {
          const haystack = [
            o.description,
            o.unit,
            o.assignedMechanic,
            o.status,
            ...(o.notes || []).map((n) => n.text),
          ]
            .filter(Boolean)
            .join(' ')
            .toLowerCase();
          return haystack.includes(q);
        })
      : [];
    const openOrders = orders
      .filter((o) => o.status !== 'Done')
      .slice()
      .sort((a, b) => {
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return 0;
      });

    const renderOrderCard = (o) => {
      const isDone = o.status === 'Done';
      return (
        <button
          key={o.id}
          onClick={() => { setActiveUnit(o.unit); setActiveOrderId(o.id); setScreen('order'); setConfirmDelete(false); }}
          style={{ background: isDone ? COLORS.line : COLORS.manila, color: isDone ? COLORS.inkDim : COLORS.ink2 }}
          className="relative rounded-lg p-5 pl-8 text-left w-full focus:outline-none focus:ring-2 transition-all hover:scale-102 active:scale-98"
        >
          <PunchHole bg={isDone ? COLORS.line : COLORS.manila} />
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <p className="font-mono text-xs mb-1 font-semibold" style={{ color: isDone ? COLORS.line : '#5B5342' }}>{o.unit}</p>
              <p className="font-body font-semibold text-base leading-snug mb-2">{o.description || '(no description)'}</p>
              <div className="flex flex-wrap items-center gap-4 font-mono text-xs" style={{ color: isDone ? COLORS.line : '#5B5342', opacity: isDone ? 0.6 : 1 }}>
                {o.assignedMechanic && <span>👤 {o.assignedMechanic}</span>}
                {o.dueDate && <span>📅 {fmtDate(o.dueDate)}</span>}
              </div>
            </div>
            <StatusStamp status={o.status} small />
          </div>
        </button>
      );
    };

    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-5xl mx-auto">
          <div className="flex items-start justify-between mb-10">
            <div>
              <p className="font-display text-xs uppercase tracking-[0.3em] mb-2" style={{ color: COLORS.accent }}>Harder Contracting</p>
              <h1 className="font-display text-3xl sm:text-4xl font-bold">Board</h1>
            </div>
            <div className="flex items-center gap-3">
              {isAdmin && (
                <button
                  onClick={() => setScreen('team')}
                  className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                  style={{ color: COLORS.accent, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
                >
                  ⚙️ Team
                </button>
              )}
              <button
                onClick={() => setScreen('checklists')}
                className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                style={{ color: COLORS.accent, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
              >
                📋 Checklists
              </button>
              <button
                onClick={() => { setCurrentMechanic(null); setScreen('login'); }}
                className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                style={{ color: COLORS.inkDim, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
              >
                👤 {currentMechanic}
              </button>
            </div>
          </div>

          <div className="flex items-center justify-end gap-4 -mt-7 mb-8">
            <button onClick={startChangePin} className="text-xs underline" style={{ color: COLORS.inkDim }}>
              Change PIN
            </button>
            <button onClick={toggleBiometric} className="text-xs underline" style={{ color: COLORS.inkDim }}>
              {localStorage.getItem('webauthn_cred_' + currentMechanic) ? 'Turn off Face/Touch ID' : 'Enable Face/Touch ID'}
            </button>
            {bioMsg && <span className="text-xs font-semibold" style={{ color: COLORS.accent }}>{bioMsg}</span>}
          </div>

          <div className="relative mb-8">
            <input
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              placeholder="🔍 Search work orders — a name, a unit, a word like 'brake'…"
              className="w-full rounded-xl px-5 py-4 text-base focus:outline-none focus:ring-2"
              style={{ background: COLORS.surface, color: COLORS.ink, border: `2px solid ${COLORS.line}` }}
            />
            {searchQuery && (
              <button
                onClick={() => setSearchQuery('')}
                className="absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                style={{ color: COLORS.inkDim }}
              >
                ✕
              </button>
            )}
          </div>

          {q ? (
            <div>
              <h2 className="font-display text-lg font-semibold uppercase tracking-wide mb-5">
                {searchResults.length} result{searchResults.length !== 1 ? 's' : ''} for "{searchQuery}"
              </h2>
              {searchResults.length === 0 ? (
                <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
                  <p className="text-base" style={{ color: COLORS.inkDim }}>No work orders match that search.</p>
                </div>
              ) : (
                <div className="space-y-3">{searchResults.map(renderOrderCard)}</div>
              )}
            </div>
          ) : (
            <React.Fragment>
              <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
                <h2 className="font-display text-lg font-semibold uppercase tracking-wide">Open Work Orders</h2>
                <div className="flex gap-2">
                  <button
                    onClick={() => setScreen('machines')}
                    className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
                    style={{ color: COLORS.inkDim, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
                  >
                    View by machine
                  </button>
                  <Btn onClick={() => setShowAddOrder((s) => !s)}>+ New Work Order</Btn>
                </div>
              </div>

              {showAddOrder && (
                <NewOrderForm
                  mechanics={mechanics}
                  units={units}
                  onCancel={() => setShowAddOrder(false)}
                  onSubmit={createOrder}
                />
              )}

              {openOrders.length === 0 ? (
                <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
                  <p className="font-body text-base mb-2" style={{ color: COLORS.inkDim }}>All caught up!</p>
                  <p className="font-body text-sm" style={{ color: COLORS.line }}>No open work orders right now.</p>
                </div>
              ) : (
                <div className="space-y-3">{openOrders.map(renderOrderCard)}</div>
              )}
            </React.Fragment>
          )}

          <p className="font-body text-xs mt-12 text-center" style={{ color: COLORS.line }}>All mechanics see the same board in real time</p>
        </div>
      </div>
    );
  }

  // ---------- MACHINES (grouped by unit) ----------
  if (screen === 'machines') {
    const counts = (unit) => {
      const list = orders.filter((o) => o.unit === unit);
      return {
        Open: list.filter((o) => o.status === 'Open').length,
        'In Progress': list.filter((o) => o.status === 'In Progress').length,
        Done: list.filter((o) => o.status === 'Done').length,
      };
    };
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-5xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>

          <div className="flex items-center justify-between mb-5">
            <h2 className="font-display text-lg font-semibold uppercase tracking-wide">Your machines</h2>
            <Btn variant="ghost" onClick={() => setShowAddUnit((s) => !s)}>+ Add machine</Btn>
          </div>

          {showAddUnit && (
            <div className="flex gap-2 mb-5">
              <input
                value={newUnitName}
                onChange={(e) => setNewUnitName(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && addUnit()}
                placeholder="Unit number, e.g. UNIT-104"
                className="flex-1 rounded-sm px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              />
              <Btn onClick={addUnit}>Add</Btn>
            </div>
          )}

          {units.length === 0 ? (
            <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
              <p className="font-body text-base mb-4" style={{ color: COLORS.inkDim }}>No machines added yet</p>
              <p className="font-body text-sm" style={{ color: COLORS.line }}>Tap "Add machine" above to get started</p>
            </div>
          ) : (
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
              {units.map((u) => {
                const c = counts(u);
                const totalJobs = c.Open + c['In Progress'] + c.Done;
                return (
                  <button
                    key={u}
                    onClick={() => { setActiveUnit(u); setScreen('unit'); }}
                    className="text-left rounded-lg p-5 focus:outline-none focus:ring-2 transition-all hover:scale-105 active:scale-95"
                    style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}
                  >
                    <p className="font-mono text-xl font-semibold mb-4 truncate">{u}</p>
                    <div className="space-y-2">
                      <div className="flex items-center justify-between text-sm">
                        <span style={{ color: COLORS.open }}>📋 Open</span>
                        <span className="font-semibold" style={{ color: COLORS.open }}>{c.Open}</span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span style={{ color: COLORS.progress }}>🔧 In progress</span>
                        <span className="font-semibold" style={{ color: COLORS.progress }}>{c['In Progress']}</span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span style={{ color: COLORS.done }}>✓ Done</span>
                        <span className="font-semibold" style={{ color: COLORS.done }}>{c.Done}</span>
                      </div>
                    </div>
                    {totalJobs > 0 && (
                      <div className="mt-3 pt-3 border-t" style={{ borderColor: COLORS.line }}>
                        <span className="text-xs font-display uppercase tracking-wide" style={{ color: COLORS.inkDim }}>
                          {totalJobs} job{totalJobs !== 1 ? 's' : ''} total
                        </span>
                      </div>
                    )}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }


  // ---------- TEAM (admin only) ----------
  if (screen === 'team') {
    if (!isAdmin) {
      return (
        <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8 flex items-center justify-center">
          {FONT_STYLE}
          <div className="text-center">
            <p className="font-display text-lg font-bold mb-4">Admins only</p>
            <Btn onClick={() => setScreen('dashboard')}>Back to board</Btn>
          </div>
        </div>
      );
    }
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <div className="max-w-2xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>
          <h1 className="font-display text-3xl font-bold mb-2">Team</h1>
          <p className="text-sm mb-8" style={{ color: COLORS.inkDim }}>
            Manage who can sign in, and who has admin access like you.
          </p>

          <div className="space-y-3">
            {mechanics.map((m) => {
              const isSelf = m === currentMechanic;
              const mIsAdmin = admins.includes(m);
              return (
                <div key={m} className="rounded-lg p-4" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
                  <div className="flex items-center justify-between gap-3 mb-3">
                    <div className="flex items-center gap-2">
                      <p className="font-display font-bold text-lg">{m}</p>
                      {mIsAdmin && (
                        <span
                          className="text-xs font-display font-bold uppercase tracking-wide px-2 py-0.5 rounded-full"
                          style={{ background: COLORS.accent, color: '#1B1F19' }}
                        >
                          Admin
                        </span>
                      )}
                      {isSelf && <span className="text-xs" style={{ color: COLORS.inkDim }}>(you)</span>}
                    </div>
                  </div>

                  {showRemoveConfirm === m ? (
                    <div className="flex flex-wrap items-center gap-2">
                      <span className="text-sm" style={{ color: COLORS.inkDim }}>Remove {m}? Their past work orders stay on record.</span>
                      <Btn variant="danger" onClick={() => removeMechanic(m)}>Yes, remove</Btn>
                      <Btn variant="ghost" onClick={() => setShowRemoveConfirm(null)}>Cancel</Btn>
                    </div>
                  ) : (
                    <div className="flex gap-2">
                      {!isSelf && (
                        <button
                          onClick={() => toggleAdmin(m)}
                          className="text-xs font-display uppercase tracking-wider font-semibold px-3 py-2 rounded-lg"
                          style={{ color: COLORS.inkDim, background: COLORS.surfaceRaised, border: `1px solid ${COLORS.line}` }}
                        >
                          {mIsAdmin ? 'Remove admin' : 'Make admin'}
                        </button>
                      )}
                      {!isSelf && (
                        <button
                          onClick={() => setShowRemoveConfirm(m)}
                          className="text-xs font-display uppercase tracking-wider font-semibold px-3 py-2 rounded-lg"
                          style={{ color: '#E07A5F', background: COLORS.surfaceRaised, border: `1px solid ${COLORS.line}` }}
                        >
                          Remove from team
                        </button>
                      )}
                      {isSelf && (
                        <span className="text-xs" style={{ color: COLORS.line }}>Ask another admin to change your access</span>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ---------- CHECKLIST TEMPLATES ----------
  if (screen === 'checklists') {
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-3xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>
          <div className="flex items-center justify-between mb-8">
            <h1 className="font-display text-3xl font-bold">Checklists</h1>
            <Btn onClick={() => setShowNewTemplate((s) => !s)}>+ New checklist</Btn>
          </div>

          {showNewTemplate && (
            <NewTemplateForm onCancel={() => setShowNewTemplate(false)} onSubmit={addTemplate} />
          )}

          {templates.length === 0 ? (
            <div className="rounded-lg p-10 text-center" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
              <p className="text-base mb-2" style={{ color: COLORS.inkDim }}>No custom checklists yet</p>
              <p className="text-sm" style={{ color: COLORS.line }}>Tap "+ New checklist" above, or use the built-in templates when creating a work order.</p>
            </div>
          ) : (
            <div className="space-y-4">
              {templates.map((t) => {
                const isDefault = ['buncher-b4', 'excavator-ex1', 'crawler', 'processor', 'skidder'].includes(t.id);
                if (editingTemplateId === t.id) {
                  return (
                    <NewTemplateForm
                      key={t.id}
                      isEdit
                      initialName={t.name}
                      initialItemsText={t.items.join('\n')}
                      onCancel={() => setEditingTemplateId(null)}
                      onSubmit={(name, itemsText) => updateTemplate(t.id, name, itemsText)}
                    />
                  );
                }
                return (
                  <div key={t.id} className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
                    <div className="flex items-start justify-between gap-3 mb-3">
                      <div className="flex-1">
                        <p className="font-display font-bold text-lg">{t.name}</p>
                        <p className="text-sm" style={{ color: COLORS.line }}>{t.items.length} steps</p>
                      </div>
                      <div className="flex gap-3">
                        <button
                          onClick={() => setEditingTemplateId(t.id)}
                          className="text-xs font-display uppercase tracking-wider hover:opacity-70"
                          style={{ color: COLORS.accent }}
                        >
                          Edit
                        </button>
                        {!isDefault && (
                          <button 
                            onClick={() => setConfirmDeleteTemplate(confirmDeleteTemplate === t.id ? null : t.id)} 
                            className="text-xs font-display uppercase tracking-wider hover:opacity-70"
                            style={{ color: '#D6604A' }}
                          >
                            {confirmDeleteTemplate === t.id ? '✕ Close' : 'Delete'}
                          </button>
                        )}
                      </div>
                    </div>
                    <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>
                      {t.items.slice(0, 3).join(' • ')}
                      {t.items.length > 3 ? ' • …' : ''}
                    </p>
                    {confirmDeleteTemplate === t.id && !isDefault && (
                      <div className="mt-3 pt-3 border-t" style={{ borderColor: COLORS.line }}>
                        <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>Are you sure? You can't undo this.</p>
                        <Btn variant="danger" onClick={() => deleteTemplate(t.id)}>Yes, delete this checklist</Btn>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---------- UNIT VIEW ----------
  if (screen === 'unit') {
    const unitOrders = orders.filter((o) => o.unit === activeUnit).sort((a, b) => (a.status === 'Done') - (b.status === 'Done'));
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-3xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="font-display text-xs uppercase tracking-wider mb-6 focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
            ← Back to board
          </button>
          <div className="flex items-center justify-between mb-8">
            <h1 className="font-mono text-3xl font-bold">{activeUnit}</h1>
            <Btn onClick={() => setShowAddOrder((s) => !s)}>+ New job</Btn>
          </div>

          {showAddOrder && (
            <NewOrderForm
              mechanics={mechanics}
              units={units}
              lockUnit={activeUnit}
              onCancel={() => setShowAddOrder(false)}
              onSubmit={createOrder}
            />
          )}

          {unitOrders.length === 0 ? (
            <div className="rounded-lg p-10 text-center mt-6" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
              <p className="text-base mb-2" style={{ color: COLORS.inkDim }}>All caught up!</p>
              <p className="text-sm" style={{ color: COLORS.line }}>No work orders yet. Tap "+ Work Order" to create one.</p>
            </div>
          ) : (
            <div className="mt-6 space-y-3">
              {unitOrders.map((o) => {
                const isDone = o.status === 'Done';
                return (
                  <button
                    key={o.id}
                    onClick={() => { setActiveOrderId(o.id); setScreen('order'); setConfirmDelete(false); }}
                    style={{ background: isDone ? COLORS.line : COLORS.manila, color: isDone ? COLORS.inkDim : COLORS.ink2 }}
                    className="relative rounded-lg p-5 pl-8 text-left w-full focus:outline-none focus:ring-2 transition-all hover:scale-102 active:scale-98"
                  >
                    <PunchHole bg={isDone ? COLORS.line : COLORS.manila} />
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex-1 min-w-0">
                        <p className="font-body font-semibold text-base leading-snug mb-2">{o.description || '(no description)'}</p>
                        <div className="flex flex-wrap items-center gap-4 font-mono text-xs" style={{ color: isDone ? COLORS.line : '#5B5342', opacity: isDone ? 0.6 : 1 }}>
                          {o.assignedMechanic && <span>👤 {o.assignedMechanic}</span>}
                          {o.hours && o.hours !== '' && <span>⏱️ {o.hours}h</span>}
                          {o.dueDate && <span>📅 {fmtDate(o.dueDate)}</span>}
                        </div>
                        {o.checklist && (
                          <div className="mt-2 text-xs font-semibold" style={{ color: isDone ? COLORS.line : COLORS.accent }}>
                            ✓ {o.checklist.items.filter((i) => i.checked).length}/{o.checklist.items.length} checklist items done
                          </div>
                        )}
                      </div>
                      <StatusStamp status={o.status} small />
                    </div>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---------- ORDER DETAIL ----------
  if (screen === 'order') {
    const order = orders.find((o) => o.id === activeOrderId);
    if (!order) {
      setScreen('unit');
      return null;
    }
    return (
      <div style={{ background: COLORS.bg, color: COLORS.ink, minHeight: '100vh' }} className="font-body p-5 sm:p-8">
        {FONT_STYLE}
        <OfflineBanner isOnline={isOnline} />
        <PinModalOverlay
          pinModal={pinModal}
          pinInput={pinInput}
          setPinInput={setPinInput}
          pinError={pinError}
          onSubmit={submitPin}
          onCancel={cancelPinModal}
          onForgot={forgotPin}
        />
        <BiometricOfferOverlay
          mechanic={offerBiometric}
          onEnable={async () => {
            const name = offerBiometric;
            setOfferBiometric(null);
            try {
              await registerBiometric(name);
            } catch (e) {
              // ignore — user can enable it later from the board
            }
          }}
          onSkip={() => setOfferBiometric(null)}
        />
        <div className="max-w-2xl mx-auto">
          <div className="flex items-center justify-between mb-6 no-print">
            <button onClick={() => setScreen('unit')} className="font-display text-xs uppercase tracking-wider focus:outline-none hover:opacity-70 transition-opacity" style={{ color: COLORS.inkDim }}>
              ← Back to {activeUnit}
            </button>
            <button
              onClick={() => window.print()}
              className="font-display text-xs uppercase tracking-wider font-semibold px-3 py-2 rounded-lg transition-all hover:scale-105"
              style={{ color: COLORS.accent, background: COLORS.surface, border: `1px solid ${COLORS.line}` }}
            >
              🖨️ Print
            </button>
          </div>

          <div id="printable-order" style={{ background: COLORS.manila, color: COLORS.ink2 }} className="relative rounded-lg p-7 pl-10 shadow-lg">
            <PunchHole />
            <div className="flex items-start justify-between mb-4 gap-3">
              <p className="font-mono text-xs" style={{ color: '#5B5342' }}>
                {activeUnit} · opened {fmtDate(order.dateCreated)} by {order.createdBy}
              </p>
              <StatusStamp status={order.status} />
            </div>

            <label className="block mb-4">
              <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Issue description</span>
              <textarea
                value={order.description}
                onChange={(e) => updateOrder(order.id, { description: e.target.value })}
                rows={3}
                className="w-full rounded-sm px-3 py-2 text-sm font-body focus:outline-none focus:ring-2"
                style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
              />
            </label>

            <div className="grid grid-cols-2 gap-3 mb-4">
              <label className="block">
                <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Assigned mechanic</span>
                <select
                  value={order.assignedMechanic || ''}
                  onChange={(e) => updateOrder(order.id, { assignedMechanic: e.target.value })}
                  className="w-full rounded-sm px-3 py-2 text-sm font-body focus:outline-none focus:ring-2"
                  style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
                >
                  <option value="">Unassigned</option>
                  {mechanics.map((m) => <option key={m} value={m}>{m}</option>)}
                </select>
              </label>
              <label className="block">
                <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Machine hours</span>
                <input
                  type="number"
                  value={order.hours || ''}
                  onChange={(e) => updateOrder(order.id, { hours: e.target.value })}
                  className="w-full rounded-sm px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                  style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
                />
              </label>
            </div>

            <label className="block mb-5">
              <span className="font-display text-xs uppercase tracking-wider block mb-1" style={{ color: '#6B6250' }}>Due date</span>
              <input
                type="date"
                value={order.dueDate || ''}
                onChange={(e) => updateOrder(order.id, { dueDate: e.target.value })}
                className="w-full sm:w-1/2 rounded-sm px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2"
                style={{ background: '#EFE3C4', color: COLORS.ink2, border: `1px solid ${COLORS.manilaDark}` }}
              />
            </label>

            <div className="mb-2">
              <span className="font-display text-xs uppercase tracking-wider block mb-2" style={{ color: '#6B6250' }}>Status</span>
              <div className="flex gap-2">
                {STATUSES.map((s) => (
                  <button
                    key={s}
                    onClick={() => updateOrder(order.id, { status: s })}
                    className="font-display text-xs uppercase font-semibold tracking-wide px-3 py-1.5 rounded-sm focus:outline-none focus:ring-2"
                    style={{
                      border: `2px solid ${statusColor(s)}`,
                      color: order.status === s ? COLORS.ink2 : statusColor(s),
                      background: order.status === s ? statusColor(s) : 'transparent',
                    }}
                  >
                    {s}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="mt-8">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-display text-lg font-bold">Checklist</h3>
              {order.checklist && (
                <button onClick={() => detachChecklist(order.id)} className="text-xs font-display uppercase tracking-wider text-red-400 hover:opacity-70 focus:outline-none" style={{ color: '#D6604A' }}>
                  Remove
                </button>
              )}
            </div>
            {!order.checklist ? (
              <div className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}` }}>
                {templates.length > 0 && !showAdHocChecklist && (
                  <div className="mb-4">
                    <p className="text-sm mb-3" style={{ color: COLORS.inkDim }}>Pick a checklist to use for this job:</p>
                    <div className="flex gap-2">
                      <select
                        value={attachTemplateId}
                        onChange={(e) => setAttachTemplateId(e.target.value)}
                        className="flex-1 rounded-lg px-4 py-2 text-base focus:outline-none focus:ring-2"
                        style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
                      >
                        <option value="">Select a checklist…</option>
                        {templates.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
                      </select>
                      <Btn disabled={!attachTemplateId} onClick={() => attachChecklist(order.id, attachTemplateId)}>Add</Btn>
                    </div>
                  </div>
                )}

                {!showAdHocChecklist ? (
                  <button
                    onClick={() => setShowAdHocChecklist(true)}
                    className="text-sm underline"
                    style={{ color: COLORS.accent }}
                  >
                    + Create a checklist just for this job
                  </button>
                ) : (
                  <AdHocChecklistForm
                    onCancel={() => setShowAdHocChecklist(false)}
                    onSubmit={async (name, itemsText, saveAsTemplate) => {
                      await createAdHocChecklist(order.id, name, itemsText, saveAsTemplate);
                      setShowAdHocChecklist(false);
                    }}
                  />
                )}
              </div>
            ) : (
              <div className="rounded-lg p-5" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
                <div className="flex items-center justify-between mb-4 pb-4" style={{ borderBottomColor: COLORS.line, borderBottomWidth: '1px' }}>
                  <p className="font-display font-semibold" style={{ color: COLORS.accent }}>
                    {order.checklist.templateName}
                  </p>
                  <span className="font-mono text-sm font-bold" style={{ color: COLORS.accent }}>
                    {order.checklist.items.filter((i) => i.checked).length}/{order.checklist.items.length}
                  </span>
                </div>
                <div className="space-y-3">
                  {order.checklist.items.map((it) => (
                    <label key={it.id} className="flex items-start gap-3 cursor-pointer group">
                      <input
                        type="checkbox"
                        checked={it.checked}
                        onChange={() => toggleChecklistItem(order.id, it.id)}
                        className="mt-1 w-5 h-5 rounded focus:outline-none focus:ring-2 cursor-pointer"
                        style={{ accentColor: COLORS.accent }}
                      />
                      <div className="flex-1">
                        <span className="text-base" style={{ color: it.checked ? COLORS.line : COLORS.ink, textDecoration: it.checked ? 'line-through' : 'none' }}>
                          {it.text}
                        </span>
                        {it.checked && it.checkedBy && (
                          <span className="block font-mono text-xs mt-1" style={{ color: COLORS.line }}>
                            ✓ {it.checkedBy} on {new Date(it.checkedAt).toLocaleDateString()}
                          </span>
                        )}
                      </div>
                    </label>
                  ))}
                </div>
              </div>
            )}
          </div>

          <PhotosSection
            order={order}
            onAdd={(dataUrls) => addPhotos(order.id, dataUrls)}
            onRemove={(photoId) => removePhoto(order.id, photoId)}
          />

          <div className="mt-8">
            <h3 className="font-display text-lg font-bold mb-4">Notes & Updates</h3>
            <div className="space-y-3 mb-5">
              {(order.notes || []).length === 0 && (
                <p className="text-sm text-center py-4" style={{ color: COLORS.line }}>No notes yet. Add one to keep the team in the loop.</p>
              )}
              {(order.notes || []).slice().reverse().map((n) => (
                <div key={n.id} className="rounded-lg p-4" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}` }}>
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-display font-semibold text-sm" style={{ color: COLORS.accent }}>💬 {n.author}</span>
                    <span className="font-mono text-xs" style={{ color: COLORS.line }}>{new Date(n.ts).toLocaleString()}</span>
                  </div>
                  <p className="text-base">{n.text}</p>
                </div>
              ))}
            </div>
            <NoteForm onSubmit={(text) => addNote(order.id, text)} />
          </div>

          <div className="mt-8 flex justify-end">
            {!confirmDelete ? (
              <Btn variant="danger" onClick={() => setConfirmDelete(true)}>Delete work order</Btn>
            ) : (
              <div className="flex items-center gap-2">
                <span className="text-sm" style={{ color: COLORS.inkDim }}>Delete this work order for good?</span>
                <Btn variant="danger" onClick={() => deleteOrder(order.id)}>Yes, delete</Btn>
                <Btn variant="ghost" onClick={() => setConfirmDelete(false)}>Cancel</Btn>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

function NewTemplateForm({ onSubmit, onCancel, initialName, initialItemsText, isEdit }) {
  const [name, setName] = useState(initialName || '');
  const [itemsText, setItemsText] = useState(initialItemsText || '');
  return (
    <div className="rounded-lg p-6 mb-6" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
      <h3 className="font-display text-lg font-bold mb-4">{isEdit ? 'Edit checklist' : 'Create a new checklist'}</h3>
      <TextField label="What's this checklist for?" value={name} onChange={setName} placeholder="e.g. Engine rebuild, Pre-shift inspection" helper="Give it a clear, descriptive name" />
      <label className="block mb-4">
        <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Steps to complete</span>
        <span className="text-xs block mb-2" style={{ color: COLORS.inkDim }}>Type one step per line. Example:</span>
        <textarea
          value={itemsText}
          onChange={(e) => setItemsText(e.target.value)}
          rows={10}
          placeholder={'Change engine oil\nReplace air filter\nCheck coolant level\nInspect for leaks\nTest engine'}
          className="w-full rounded-lg px-4 py-3 text-base font-body focus:outline-none focus:ring-2 resize-none"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
      </label>
      <div className="flex gap-2">
        <Btn onClick={() => name.trim() && itemsText.trim() && onSubmit(name, itemsText)}>{isEdit ? 'Save changes' : 'Save checklist'}</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  );
}

function AdHocChecklistForm({ onSubmit, onCancel }) {
  const [name, setName] = useState('');
  const [itemsText, setItemsText] = useState('');
  const [saveAsTemplate, setSaveAsTemplate] = useState(false);
  const canSubmit = name.trim() && itemsText.trim();

  return (
    <div className="mt-4 pt-4" style={{ borderTop: `1px solid ${COLORS.line}` }}>
      <TextField label="What's this checklist for?" value={name} onChange={setName} placeholder="e.g. Off-season transmission rebuild" />
      <label className="block mb-4">
        <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Steps to complete</span>
        <span className="text-xs block mb-2" style={{ color: COLORS.inkDim }}>Type one step per line</span>
        <textarea
          value={itemsText}
          onChange={(e) => setItemsText(e.target.value)}
          rows={6}
          placeholder={'Drain transmission fluid\nRemove pan and inspect\nReplace filter\nRefill and torque test'}
          className="w-full rounded-lg px-4 py-3 text-base font-body focus:outline-none focus:ring-2 resize-none"
          style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
        />
      </label>
      <label className="flex items-center gap-2 mb-4 cursor-pointer">
        <input
          type="checkbox"
          checked={saveAsTemplate}
          onChange={(e) => setSaveAsTemplate(e.target.checked)}
          className="w-4 h-4"
          style={{ accentColor: COLORS.accent }}
        />
        <span className="text-sm" style={{ color: COLORS.inkDim }}>Also save this to the checklist library for future jobs</span>
      </label>
      <div className="flex gap-2">
        <Btn disabled={!canSubmit} onClick={() => onSubmit(name, itemsText, saveAsTemplate)}>Add to this job</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  );
}

function NewOrderForm({ mechanics, units, onSubmit, onCancel, lockUnit }) {
  const [description, setDescription] = useState('');
  const [assignedMechanic, setAssignedMechanic] = useState('');
  const [hours, setHours] = useState('');
  const [dueDate, setDueDate] = useState('');
  const [unit, setUnit] = useState(lockUnit || '');
  const [addingNewUnit, setAddingNewUnit] = useState(false);
  const [newUnitName, setNewUnitName] = useState('');

  const handleUnitChange = (val) => {
    if (val === '__new__') {
      setAddingNewUnit(true);
      setUnit('');
    } else {
      setAddingNewUnit(false);
      setUnit(val);
    }
  };

  const finalUnit = addingNewUnit ? newUnitName.trim() : unit;
  const canSubmit = description.trim() && finalUnit;

  return (
    <div className="rounded-lg p-6 mb-6" style={{ background: COLORS.surface, border: `2px solid ${COLORS.line}` }}>
      <h3 className="font-display text-lg font-bold mb-4">Create a work order</h3>

      {!lockUnit && (
        <label className="block mb-4">
          <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Which machine?</span>
          {!addingNewUnit ? (
            <select
              value={unit}
              onChange={(e) => handleUnitChange(e.target.value)}
              className="w-full rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2"
              style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
            >
              <option value="">Select a machine…</option>
              {units.map((u) => <option key={u} value={u}>{u}</option>)}
              <option value="__new__">+ Add a new machine…</option>
            </select>
          ) : (
            <div className="flex gap-2">
              <input
                value={newUnitName}
                onChange={(e) => setNewUnitName(e.target.value)}
                placeholder="New machine unit number"
                autoFocus
                className="flex-1 rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2 font-mono"
                style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
              />
              <button
                onClick={() => { setAddingNewUnit(false); setNewUnitName(''); }}
                className="px-3 rounded-lg text-sm"
                style={{ color: COLORS.inkDim, border: `1px solid ${COLORS.line}` }}
              >
                Cancel
              </button>
            </div>
          )}
        </label>
      )}

      <TextField label="What needs to be fixed?" value={description} onChange={setDescription} placeholder="e.g. Replace hydraulic pump, Fix leaking hose" helper="Be specific so the mechanic knows what to do" />
      <div className="grid grid-cols-2 gap-4 mb-4">
        <label className="block">
          <span className="font-display text-sm font-semibold block mb-2" style={{ color: COLORS.ink }}>Who's doing this?</span>
          <select
            value={assignedMechanic}
            onChange={(e) => setAssignedMechanic(e.target.value)}
            className="w-full rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2"
            style={{ background: COLORS.surfaceRaised, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
          >
            <option value="">Leave unassigned</option>
            {mechanics.map((m) => <option key={m} value={m}>{m}</option>)}
          </select>
        </label>
        <TextField label="Machine hours" value={hours} onChange={setHours} placeholder="Current hour meter reading" type="number" mono />
      </div>
      <TextField label="When do you need it done?" value={dueDate} onChange={setDueDate} type="date" mono />
      <div className="flex gap-2 mt-6">
        <Btn onClick={() => canSubmit && onSubmit({ unit: finalUnit, description, assignedMechanic, hours, dueDate })} disabled={!canSubmit}>Create job</Btn>
        <Btn variant="ghost" onClick={onCancel}>Nevermind</Btn>
      </div>
    </div>
  );
}

function NoteForm({ onSubmit }) {
  const [text, setText] = useState('');
  return (
    <div className="flex gap-2">
      <textarea
        value={text}
        onChange={(e) => setText(e.target.value)}
        placeholder="What's the status? Any issues? Tips for next shift?"
        rows={2}
        className="flex-1 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 resize-none"
        style={{ background: COLORS.surface, color: COLORS.ink, border: `1px solid ${COLORS.line}` }}
      />
      <Btn onClick={() => { onSubmit(text); setText(''); }} disabled={!text.trim()}>Post</Btn>
    </div>
  );
}

function PhotosSection({ order, onAdd, onRemove }) {
  const [uploading, setUploading] = useState(false);
  const [viewerPhoto, setViewerPhoto] = useState(null);
  const media = order.media || [];

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    setUploading(true);
    try {
      const compressed = await Promise.all(files.map((f) => compressImage(f)));
      await onAdd(compressed);
    } catch (err) {
      console.error('photo upload failed', err);
    }
    setUploading(false);
    e.target.value = '';
  };

  return (
    <div className="mt-8 no-print">
      <h3 className="font-display text-lg font-bold mb-4">Photos</h3>

      {media.length > 0 && (
        <div className="grid grid-cols-3 gap-2 mb-4">
          {media.map((m) => (
            <div key={m.id} className="relative aspect-square rounded-lg overflow-hidden" style={{ border: `1px solid ${COLORS.line}` }}>
              <img
                src={m.dataUrl}
                onClick={() => setViewerPhoto(m)}
                className="w-full h-full object-cover cursor-pointer"
                alt="Problem photo"
              />
              <button
                onClick={() => onRemove(m.id)}
                className="absolute top-1 right-1 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold"
                style={{ background: 'rgba(0,0,0,0.6)', color: '#fff' }}
              >
                ✕
              </button>
            </div>
          ))}
        </div>
      )}

      <label
        className="block text-center rounded-lg py-4 cursor-pointer font-display font-semibold uppercase tracking-wide text-sm"
        style={{ background: COLORS.surface, border: `2px dashed ${COLORS.line}`, color: COLORS.accent }}
      >
        {uploading ? 'Uploading…' : '📷 Add photos of the problem'}
        <input
          type="file"
          accept="image/*"
          capture="environment"
          multiple
          onChange={handleFiles}
          className="hidden"
          disabled={uploading}
        />
      </label>

      {viewerPhoto && (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4"
          style={{ background: 'rgba(0,0,0,0.9)' }}
          onClick={() => setViewerPhoto(null)}
        >
          <img src={viewerPhoto.dataUrl} className="max-w-full max-h-full rounded-lg" alt="Problem photo full size" />
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
